<!DOCTYPE html>
<html>
<head>
<title>Flappy Bird</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    background:skyblue;
    font-family: Arial;
    text-align:center;
}

canvas{
    display:block;
}

#startScreen{
    position:absolute;
    width:100%;
    top:30%;
}

#title{
    font-size:50px;
    font-weight:bold;
    margin-bottom:20px;
}

#madeBy{
    position:absolute;
    bottom:20px;
    left:20px;
    font-size:14px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:orange;
    color:white;
}
</style>
</head>

<body>

<div id="startScreen">
    <div id="title">Flappy Bird</div>
    <button id="startBtn">Play</button>
</div>

<div id="madeBy">Made by TrollHunter</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");

const birdImg = new Image();
birdImg.src = "Picsart_26-02-26_17-30-25-252.png";

let bird, gravity, velocity, pipes, score, highScore, gameOver;

highScore = localStorage.getItem("highScore") || 0;

function initGame(){
    bird = { x:100, y:200, width:60, height:60 };
    gravity = 0.6;
    velocity = 0;
    pipes = [];
    score = 0;
    gameOver = false;
}

function createPipe(){
    let gap = 170;
    let topHeight = Math.random() * (canvas.height - gap - 200) + 50;

    pipes.push({
        x: canvas.width,
        width: 60,
        top: topHeight,
        bottom: canvas.height - topHeight - gap,
        passed:false
    });
}

let pipeInterval;

function startGame(){
    startScreen.style.display="none";
    initGame();
    pipeInterval = setInterval(createPipe,2000);
    update();
}

function endGame(){
    gameOver = true;
    clearInterval(pipeInterval);

    if(score > highScore){
        highScore = score;
        localStorage.setItem("highScore", highScore);
    }

    setTimeout(()=>{
        startScreen.style.display="block";
    },1500);
}

function update(){

    if(gameOver) return;

    velocity += gravity;
    bird.y += velocity;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(birdImg,bird.x,bird.y,bird.width,bird.height);

    pipes.forEach(pipe=>{
        pipe.x -= 3;

        ctx.fillStyle="green";
        ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
        ctx.fillRect(pipe.x,canvas.height-pipe.bottom,pipe.width,pipe.bottom);

        if(
            bird.x < pipe.x + pipe.width &&
            bird.x + bird.width > pipe.x &&
            (bird.y < pipe.top || bird.y + bird.height > canvas.height - pipe.bottom)
        ){
            endGame();
        }

        if(!pipe.passed && pipe.x + pipe.width < bird.x){
            score++;
            pipe.passed = true;
        }
    });

    if(bird.y + bird.height > canvas.height || bird.y < 0){
        endGame();
    }

    ctx.fillStyle="black";
    ctx.font="25px Arial";
    ctx.fillText("Score: "+score,20,40);
    ctx.fillText("High Score: "+highScore,20,70);

    requestAnimationFrame(update);
}

document.addEventListener("click",function(){
    if(startScreen.style.display==="none" && !gameOver){
        velocity = -10;
    }
});

startBtn.addEventListener("click",startGame);

</script>

</body>
</html>
