<!DOCTYPE html>
<html>
<head>
<title>Fluppy Bird</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    background:skyblue;
    font-family: Arial;
}

/* Cartoon Style Title */
#title{
    position:absolute;
    top:15%;
    width:100%;
    text-align:center;
    font-size:60px;
    font-weight:bold;
    color:yellow;
    text-shadow:4px 4px 0px black, 8px 8px 0px orange;
    font-family:'Comic Sans MS', cursive;
    animation:bounce 1s infinite alternate;
}
@keyframes bounce{
    from{ transform: translateY(0px); }
    to{ transform: translateY(-10px); }
}

/* Buttons */
#startBtn, #restartBtn, #pauseBtn, #settingsBtn{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    padding:12px 30px;
    font-size:20px;
    border:none;
    border-radius:8px;
    background:orange;
    color:white;
}
#startBtn{ top:50%; }
#restartBtn{ top:50%; display:none; }
#pauseBtn{ top:10px; right:10px; transform:none; display:none; position:absolute; }
#settingsBtn{ top:60%; left:50%; transform:translateX(-50%); }

/* Made by text */
#madeBy{
    position:absolute;
    bottom:10px;
    left:10px;
    font-size:14px;
}

/* Settings Panel */
#settingsPanel{
    position:absolute;
    top:65%;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:10px;
    border-radius:8px;
    display:none;
}
#settingsPanel label{ display:block; margin:5px 0; }

canvas{ display:block; }
</style>
</head>

<body>

<div id="title">Fluppy Bird</div>
<button id="startBtn">Play</button>
<button id="restartBtn">Restart</button>
<button id="pauseBtn">Pause</button>
<button id="settingsBtn">Settings</button>

<div id="settingsPanel">
    <label><input type="radio" name="difficulty" value="Very Easy" checked> Very Easy</label>
    <label><input type="radio" name="difficulty" value="Normal"> Normal</label>
    <label><input type="radio" name="difficulty" value="Hard"> Hard</label>
</div>

<div id="madeBy">Made by TrollHunter</div>

<canvas id="gameCanvas"></canvas>

<script>
// Canvas setup
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Elements
const title = document.getElementById("title");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");
const pauseBtn = document.getElementById("pauseBtn");
const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");

// Bird image
const birdImg = new Image();
birdImg.src = "Picsart_26-02-26_17-30-25-252.png";

// Game variables
let bird, gravity, pipes, score, highScore, gameOver, gameStarted, paused, pipeSpeed, difficulty;
highScore = localStorage.getItem("fluppyHighScore") || 0;

// Difficulty speeds
const difficultySpeeds = { "Very Easy":2, "Normal":4, "Hard":6 };

// Init game
function initGame(){
    bird = {x:100, y:200, width:60, height:60, velocity:0};
    gravity = 0.5;
    pipes = [];
    score = 0;
    gameOver = false;
    paused = false;
    difficulty = "Very Easy";
    pipeSpeed = difficultySpeeds[difficulty];
    document.querySelector(`input[name="difficulty"][value="${difficulty}"]`).checked = true;
}

// Create pipes
function createPipe(){
    const gap = 170;
    const topHeight = Math.random() * (canvas.height - gap - 200) + 50;
    pipes.push({x:canvas.width, width:60, top:topHeight, bottom:canvas.height-topHeight-gap, passed:false});
}

let pipeInterval;

// Start game
function startGame(){
    title.style.display="none";
    startBtn.style.display="none";
    settingsBtn.style.display="none";
    restartBtn.style.display="none";
    pauseBtn.style.display="block";

    gameStarted = true;
    initGame();
    pipeInterval = setInterval(createPipe,2000);
    update();
}

// End game
function endGame(){
    gameOver = true;
    clearInterval(pipeInterval);
    restartBtn.style.display="block";
    pauseBtn.style.display="none";

    if(score > highScore){
        highScore = score;
        localStorage.setItem("fluppyHighScore", highScore);
    }
}

// Medal system
function getMedal(score){
    if(score >= 26) return "Gold 🥇";
    if(score >= 16) return "Silver 🥈";
    if(score >= 6) return "Bronze 🥉";
    return "No Medal 😅";
}

// Day/Night theme
function updateTheme(){
    if(score>=10) canvas.style.background="#1a1a2e";
    else if(score>=5) canvas.style.background="#70c5ce";
}

// Update loop
function update(){
    if(!gameStarted || gameOver || paused) return;

    bird.velocity += gravity;
    bird.y += bird.velocity;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Bounce animation
    ctx.save();
    const bounce = Math.sin(Date.now()/150)*5;
    ctx.drawImage(birdImg, bird.x, bird.y + bounce, bird.width, bird.height);
    ctx.restore();

    // Pipes
    pipes.forEach(pipe=>{
        pipe.x -= pipeSpeed;
        ctx.fillStyle="green";
        ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
        ctx.fillRect(pipe.x,canvas.height-pipe.bottom,pipe.width,pipe.bottom);

        if(bird.x < pipe.x+pipe.width && bird.x+bird.width>pipe.x && (bird.y<pipe.top || bird.y+bird.height>canvas.height-pipe.bottom)){
            endGame();
        }

        if(!pipe.passed && pipe.x+pipe.width<bird.x){
            score++;
            pipe.passed=true;
        }
    });

    if(bird.y+bird.height>canvas.height || bird.y<0) endGame();

    // Scores
    ctx.fillStyle="black";
    ctx.font="25px Arial";
    ctx.fillText("Score: "+score,20,40);
    ctx.fillText("High Score: "+highScore,20,70);

    if(gameOver){
        ctx.fillText("Medal: "+getMedal(score), canvas.width/2-60, canvas.height/2+40);
    }

    updateTheme();
    requestAnimationFrame(update);
}

// Jump
function jump(){
    if(gameStarted && !gameOver) bird.velocity = -10;
}
document.addEventListener("click", jump);
document.addEventListener("touchstart", e=>{e.preventDefault(); jump();});

// Buttons
startBtn.addEventListener("click",startGame);
restartBtn.addEventListener("click",startGame);

// Pause button
pauseBtn.addEventListener("click",()=>{
    paused=!paused;
    if(!paused) update();
});

// Settings button
settingsBtn.addEventListener("click",()=>{ settingsPanel.style.display = settingsPanel.style.display==='block'?'none':'block'; });

// Difficulty select
document.querySelectorAll('input[name="difficulty"]').forEach(radio=>{
    radio.addEventListener("change",()=>{
        difficulty = radio.value;
        pipeSpeed = difficultySpeeds[difficulty];
    });
});
</script>
</body>
</html>
