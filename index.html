<!DOCTYPE html>
<html>
<head>
<title>Fluppy Bird Final Fixed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{ margin:0; overflow:hidden; font-family:Arial; background:skyblue;}
canvas{ display:block; }

/* Screens */
#titleScreen, #settingsScreen, #storeScreen{
position:absolute; width:100%; height:100%; top:0; left:0;
display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#titleScreen{ background:skyblue; }
#titleScreen h1{
font-size:60px; color:yellow;
text-shadow:4px 4px 0 black,8px 8px 0 orange;
font-family:'Comic Sans MS', cursive;
margin-bottom:30px;
}
button{
padding:12px 30px; font-size:20px; border:none;
border-radius:12px; margin:8px; cursor:pointer;
}

#settingsScreen,#storeScreen{ display:none; background:#f0f0f0; }

.skinRow{ display:flex; flex-wrap:wrap; justify-content:center; }
.skinBox{ width:120px; margin:10px; text-align:center; cursor:pointer; position:relative; }
.skinBox img{ width:100px; height:100px; }
.lockOverlay{
position:absolute; top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.5);
display:flex; align-items:center; justify-content:center;
color:white; font-size:30px;
}

.confirmBtn.locked{ background:grey; color:white; }
.confirmBtn.unlocked{ background:green; color:white; }

#pauseBtn,#restartBtn,#homeBtn{
position:absolute; top:10px;
padding:8px 12px; border:none;
border-radius:8px; font-weight:bold;
}
#pauseBtn{ right:10px; display:none; }
#restartBtn{ display:none; top:50%; left:50%; transform:translate(-50%,-50%); }
#homeBtn{ display:none; top:60%; left:50%; transform:translate(-50%,-50%); }

</style>
</head>
<body>

<div id="titleScreen">
<h1>Fluppy Bird</h1>
<button id="playBtn">Play</button>
<button id="storeBtn">Store</button>
</div>

<div id="storeScreen">
<h2>Choose Skin</h2>
<div id="skinRow" class="skinRow"></div>
<button id="confirmSkinBtn" class="confirmBtn locked">Confirm</button>
<button onclick="backHome()">Back</button>
</div>

<canvas id="gameCanvas"></canvas>
<button id="pauseBtn">⏸</button>
<button id="restartBtn">Restart</button>
<button id="homeBtn">Home</button>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

const titleScreen=document.getElementById("titleScreen");
const storeScreen=document.getElementById("storeScreen");
const skinRow=document.getElementById("skinRow");
const confirmSkinBtn=document.getElementById("confirmSkinBtn");
const pauseBtn=document.getElementById("pauseBtn");
const restartBtn=document.getElementById("restartBtn");
const homeBtn=document.getElementById("homeBtn");

let bird,gravity,pipes,score,highScore,gameOver,gameStarted,pipeInterval;

highScore=localStorage.getItem("fluppyHighScore")||0;

/* ================= SKINS ================= */

let skins=[
{name:"Bird",file:"Picsart_26-02-26_17-30-25-252.png",unlockScore:0},
{name:"Mango Bird",file:"Picsart_26-02-27_01-28-33-302.png",unlockScore:10},
{name:"Happy Perrot",file:"Picsart_26-02-27_10-16-34-761.png",unlockScore:20},
{name:"Angry Bird",file:"Picsart_26-02-27_10-15-45-688.png",unlockScore:30}
];

let skinData=JSON.parse(localStorage.getItem("fluppySkins"))||{};
skins.forEach(s=>{
if(s.unlockScore===0) skinData[s.name]={unlocked:true};
else if(!skinData[s.name]) skinData[s.name]={unlocked:false};
});

let selectedSkinName=localStorage.getItem("selectedSkin")||"Bird";
let selectedSkin=skins.find(s=>s.name===selectedSkinName);

/* PRELOAD IMAGE (important fix) */
let birdImage=new Image();
birdImage.src=selectedSkin.file;

/* ================= GAME ================= */

function initGame(){
bird={x:100,y:200,width:60,height:60,velocity:0};
gravity=0.4;
pipes=[];
score=0;
gameOver=false;
}

function createPipe(){
const gap=250;
const topHeight=Math.random()*(canvas.height-gap-100)+50;
pipes.push({x:canvas.width,width:60,top:topHeight,bottom:canvas.height-topHeight-gap,passed:false});
}

function startGame(){
titleScreen.style.display="none";
storeScreen.style.display="none";
restartBtn.style.display="none";
homeBtn.style.display="none";
pauseBtn.style.display="block";

initGame();
gameStarted=true;
pipeInterval=setInterval(createPipe,2000);
update();
}

function endGame(){
gameOver=true;
clearInterval(pipeInterval);
restartBtn.style.display="block";
homeBtn.style.display="block";
pauseBtn.style.display="none";

/* 🔥 UNLOCK LOGIC CORRECT PLACE */
skins.forEach(s=>{
if(score>=s.unlockScore){
skinData[s.name].unlocked=true;
}
});
localStorage.setItem("fluppySkins",JSON.stringify(skinData));

if(score>highScore){
highScore=score;
localStorage.setItem("fluppyHighScore",highScore);
}
}

function update(){
if(!gameStarted||gameOver)return;

bird.velocity+=gravity;
bird.y+=bird.velocity;

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(birdImage,bird.x,bird.y,bird.width,bird.height);

pipes.forEach(pipe=>{
pipe.x-=3;

ctx.fillStyle="green";
ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
ctx.fillRect(pipe.x,canvas.height-pipe.bottom,pipe.width,pipe.bottom);

if(bird.x<pipe.x+pipe.width &&
bird.x+bird.width>pipe.x &&
(bird.y<pipe.top || bird.y+bird.height>canvas.height-pipe.bottom)){
endGame();
}

if(!pipe.passed && pipe.x+pipe.width<bird.x){
score++;
pipe.passed=true;
}
});

if(bird.y+bird.height>canvas.height||bird.y<0) endGame();

ctx.fillStyle="black";
ctx.font="25px Arial";
ctx.fillText("Score: "+score,20,40);
ctx.fillText("High Score: "+highScore,20,70);

requestAnimationFrame(update);
}

function jump(){
if(gameStarted&&!gameOver){
bird.velocity=-6;
}
}

document.addEventListener("click",jump);

/* ================= STORE ================= */

function renderSkins(){
skinRow.innerHTML="";
skins.forEach(s=>{
const box=document.createElement("div");
box.className="skinBox";

const img=document.createElement("img");
img.src=s.file;
box.appendChild(img);

const name=document.createElement("div");
name.textContent=s.name;
box.appendChild(name);

const overlay=document.createElement("div");
overlay.className="lockOverlay";
if(!skinData[s.name].unlocked) overlay.textContent="🔒";
else overlay.style.display="none";
box.appendChild(overlay);

box.onclick=()=>{
if(skinData[s.name].unlocked){
selectedSkin=s;
confirmSkinBtn.className="confirmBtn unlocked";
}else{
confirmSkinBtn.className="confirmBtn locked";
}
};

skinRow.appendChild(box);
});
}

confirmSkinBtn.onclick=()=>{
if(confirmSkinBtn.classList.contains("unlocked")){
localStorage.setItem("selectedSkin",selectedSkin.name);
birdImage.src=selectedSkin.file;
storeScreen.style.display="none";
titleScreen.style.display="flex";
}
};

function backHome(){
storeScreen.style.display="none";
titleScreen.style.display="flex";
}

/* ================= BUTTONS ================= */

document.getElementById("playBtn").onclick=startGame;
document.getElementById("storeBtn").onclick=()=>{
titleScreen.style.display="none";
storeScreen.style.display="flex";
renderSkins();
};

restartBtn.onclick=startGame;
homeBtn.onclick=()=>{
titleScreen.style.display="flex";
restartBtn.style.display="none";
homeBtn.style.display="none";
};

</script>
</body>
</html>
