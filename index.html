<!DOCTYPE html>
<html>
<head>
<title>Flupy Dak 🐤</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
overflow:hidden;
background:skyblue;
text-align:center;
}
canvas{
display:block;
margin:0 auto;
}
button{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
display:none;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<button id="restartBtn">Restart 🔄</button>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");
let restartBtn = document.getElementById("restartBtn");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bird, pipes, score, gameOver;

function init(){
bird = {
x:100,
y:150,
size:20,
gravity:0.6,
lift:-10,
velocity:0
};
pipes = [];
score = 0;
gameOver = false;
restartBtn.style.display="none";
}

function drawBird(){
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(bird.x,bird.y,bird.size,0,Math.PI*2);
ctx.fill();
}

function drawPipes(){
ctx.fillStyle="green";
pipes.forEach(pipe=>{
ctx.fillRect(pipe.x,0,50,pipe.top);
ctx.fillRect(pipe.x,pipe.bottom,50,canvas.height);

if(
bird.x + bird.size > pipe.x &&
bird.x - bird.size < pipe.x + 50 &&
(bird.y - bird.size < pipe.top ||
 bird.y + bird.size > pipe.bottom)
){
endGame();
}
});
}

function update(){
bird.velocity += bird.gravity;
bird.y += bird.velocity;

if(bird.y + bird.size > canvas.height){
endGame();
}

pipes.forEach(pipe=>{
pipe.x -= 3;
if(pipe.x === bird.x){
score++;
}
});
}

function createPipe(){
if(gameOver) return;
let gap = 150;
let top = Math.random()*(canvas.height/2);
pipes.push({
x:canvas.width,
top:top,
bottom:top+gap
});
}

setInterval(createPipe,2000);

function drawScore(){
ctx.fillStyle="black";
ctx.font="30px Arial";
ctx.fillText("Score: "+score,20,40);
}

function endGame(){
gameOver = true;
restartBtn.style.display="block";
}

function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);
drawBird();
drawPipes();
if(!gameOver){
update();
requestAnimationFrame(loop);
}
drawScore();
}

window.addEventListener("click",()=>{
if(!gameOver){
bird.velocity = bird.lift;
}
});

restartBtn.addEventListener("click",()=>{
init();
loop();
});

init();
loop();
</script>

</body>
</html>
