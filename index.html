<!DOCTYPE html>
<html>
<head>
<title>Fluppy Bird with Login & Leaderboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{ margin:0; overflow:hidden; font-family:Arial; background:skyblue;}
canvas{ display:block; }

/* Login Screen */
#loginScreen{
position:absolute; width:100%; height:100%; top:0; left:0;
display:flex; flex-direction:column; align-items:center; justify-content:center;
background:linear-gradient(45deg,#2196f3,#673ab7);
color:white; z-index:2000;
}
#loginScreen input{
padding:10px; margin:8px; font-size:18px; border:none; border-radius:8px;
}
#loginScreen button{
padding:10px 25px; font-size:18px; border:none; border-radius:10px;
background:#ffeb3b; cursor:pointer; font-weight:bold;
}

/* Leaderboard Screen */
#leaderboardScreen{
position:absolute; width:100%; height:100%; top:0; left:0;
background:#111; color:white; display:none;
flex-direction:column; align-items:center; padding-top:40px;
}
#leaderboardScreen h2{margin-bottom:20px;}
.leaderRow{
width:80%; display:flex; justify-content:space-between;
padding:10px; background:#222; margin:5px 0; border-radius:8px;
}
#backLeaderBtn{
position:absolute; top:10px; left:10px; font-size:25px;
background:none; border:none; color:white; cursor:pointer;
}

/* Title */
#titleScreen, #settingsScreen, #storeScreen{
position:absolute; width:100%; height:100%; top:0; left:0;
display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#titleScreen{ background:skyblue; display:none; }
#titleScreen h1{
font-size:60px; color:yellow;
text-shadow:4px 4px 0 black,8px 8px 0 orange;
font-family:'Comic Sans MS', cursive;
animation:bounce 1s infinite alternate;
margin-bottom:30px;
}
@keyframes bounce{0%{transform:translateY(0px);}100%{transform:translateY(-10px);}}

#titleScreen button{
padding:12px 30px; font-size:20px; border:none;
border-radius:12px; margin:8px; cursor:pointer;
transition:0.2s;
}
#leaderBtn{
position:absolute; top:10px; right:10px;
padding:6px 15px; font-size:14px;
background:black; color:white;
}

/* Game UI same as before */
#pauseBtn, #restartBtn, #homeBtn{
position:absolute; top:10px; padding:8px 12px;
border:none; border-radius:8px;
font-size:16px; cursor:pointer; font-weight:bold;
}
#pauseBtn{ right:10px; display:none; }
#restartBtn{ display:none; top:50%; left:50%; transform:translate(-50%,-50%);}
#homeBtn{ display:none; top:50%; left:50%; transform:translate(-50%,70%);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
<h2>Login</h2>
<input type="text" id="usernameInput" placeholder="Username">
<input type="number" id="ageInput" placeholder="Age">
<button id="loginBtn">Start</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboardScreen">
<button id="backLeaderBtn">&#8592;</button>
<h2>Leaderboard</h2>
<div id="leaderboardList"></div>
</div>

<!-- TITLE -->
<div id="titleScreen">
<h1>Fluppy Bird</h1>
<button id="playBtn">Play</button>
<button id="leaderBtn">Leaderboard</button>
</div>

<canvas id="gameCanvas"></canvas>
<button id="pauseBtn">⏸</button>
<button id="restartBtn">Restart</button>
<button id="homeBtn">Home</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* LOGIN SYSTEM */
const loginScreen = document.getElementById("loginScreen");
const usernameInput = document.getElementById("usernameInput");
const ageInput = document.getElementById("ageInput");
const loginBtn = document.getElementById("loginBtn");

let currentUser = JSON.parse(localStorage.getItem("fluppyCurrentUser"));

if(currentUser){
loginScreen.style.display="none";
document.getElementById("titleScreen").style.display="flex";
}

loginBtn.onclick = function(){
let name = usernameInput.value.trim();
let age = ageInput.value.trim();
if(name && age){
currentUser = {name, age, highScore:0};
localStorage.setItem("fluppyCurrentUser", JSON.stringify(currentUser));
loginScreen.style.display="none";
document.getElementById("titleScreen").style.display="flex";
}
};

/* LEADERBOARD */
const leaderboardScreen = document.getElementById("leaderboardScreen");
const leaderboardList = document.getElementById("leaderboardList");
const leaderBtn = document.getElementById("leaderBtn");
const backLeaderBtn = document.getElementById("backLeaderBtn");

leaderBtn.onclick = function(){
showLeaderboard();
document.getElementById("titleScreen").style.display="none";
leaderboardScreen.style.display="flex";
};

backLeaderBtn.onclick = function(){
leaderboardScreen.style.display="none";
document.getElementById("titleScreen").style.display="flex";
};

function showLeaderboard(){
let players = JSON.parse(localStorage.getItem("fluppyPlayers")) || [];
players.sort((a,b)=>b.highScore - a.highScore);
leaderboardList.innerHTML="";
players.forEach(p=>{
let row = document.createElement("div");
row.className="leaderRow";
row.innerHTML=`<span>${p.name} (${p.age})</span><span>${p.highScore}</span>`;
leaderboardList.appendChild(row);
});
}

/* GAME LOGIC */
let bird, gravity, pipes, score, gameStarted, gameOver;

function initGame(){
bird={x:100,y:200,width:60,height:60,velocity:0};
gravity=0.35;
pipes=[];
score=0;
gameOver=false;
}

function startGame(){
document.getElementById("titleScreen").style.display="none";
initGame();
gameStarted=true;
update();
}

function update(){
if(!gameStarted || gameOver) return;

bird.velocity+=gravity;
bird.y+=bird.velocity;
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="yellow";
ctx.fillRect(bird.x,bird.y,bird.width,bird.height);

if(bird.y>canvas.height){
endGame();
}

requestAnimationFrame(update);
}

function endGame(){
gameOver=true;
saveScore();
document.getElementById("restartBtn").style.display="block";
document.getElementById("homeBtn").style.display="block";
}

function saveScore(){
let players = JSON.parse(localStorage.getItem("fluppyPlayers")) || [];
let existing = players.find(p=>p.name===currentUser.name);
if(existing){
if(score>existing.highScore) existing.highScore=score;
}else{
currentUser.highScore=score;
players.push(currentUser);
}
localStorage.setItem("fluppyPlayers", JSON.stringify(players));
}

document.getElementById("playBtn").onclick=startGame;
document.addEventListener("click",()=>{ if(gameStarted) bird.velocity=-6; });

document.getElementById("homeBtn").onclick=function(){
location.reload();
};
</script>

</body>
</html>
