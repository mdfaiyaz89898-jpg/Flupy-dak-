<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ELEMENTS
const titleScreen = document.getElementById("titleScreen");
const settingsScreen = document.getElementById("settingsScreen");
const storeScreen = document.getElementById("storeScreen");
const playBtn = document.getElementById("playBtn");
const settingsBtnMain = document.getElementById("settingsBtnMain");
const storeBtn = document.getElementById("storeBtn");
const backBtn = document.querySelector(".backBtn");
const backStoreBtn = document.querySelector(".backStoreBtn");
const pauseBtn = document.getElementById("pauseBtn");
const restartBtn = document.getElementById("restartBtn");
const homeBtn = document.getElementById("homeBtn");

let bird, gravity, pipes, score, gameOver, gameStarted=false, paused=false;
let pipeSpeed = 2, pipeInterval, animationId;

// 🟢 IMAGE FIX (important)
let birdImg = new Image();
birdImg.src = localStorage.getItem("selectedSkinImg") || "Picsart_26-02-26_17-30-25-252.png";

// INIT
function initGame(){
    bird = {x:100,y:200,width:60,height:60,velocity:0};
    gravity = 0.35;
    pipes = [];
    score = 0;
    gameOver = false;
    paused = false;
    pipeSpeed = 2;
}

// PIPE
function createPipe(){
    let gap = 220;
    let top = Math.random()*(canvas.height-gap-100)+50;

    pipes.push({
        x:canvas.width,
        width:60,
        top:top,
        bottom:canvas.height-top-gap,
        passed:false
    });
}

// START
function startGame(){
    cancelAnimationFrame(animationId);
    clearInterval(pipeInterval);

    initGame();
    gameStarted=false;

    titleScreen.style.display="none";
    settingsScreen.style.display="none";
    storeScreen.style.display="none";

    restartBtn.style.display="none";
    homeBtn.style.display="none";
    pauseBtn.style.display="none";

    // COUNTDOWN FIX
    let count=["3","2","1","Go!"];
    let i=0;

    let overlay=document.createElement("div");
    overlay.style="position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:120px;color:white;background:rgba(0,0,0,0.3);z-index:999";
    document.body.appendChild(overlay);

    let int=setInterval(()=>{
        overlay.innerText=count[i++];
        if(i===count.length){
            clearInterval(int);
            document.body.removeChild(overlay);

            gameStarted=true;
            pauseBtn.style.display="block";

            pipeInterval=setInterval(createPipe,2700);
            animationId=requestAnimationFrame(update);
        }
    },1000);
}

// END
function endGame(){
    gameOver=true;
    clearInterval(pipeInterval);
    cancelAnimationFrame(animationId);

    restartBtn.style.display="block";
    homeBtn.style.display="block";
    pauseBtn.style.display="none";
}

// UPDATE
function update(){
    if(!gameStarted || gameOver || paused) return;

    bird.velocity += gravity;
    bird.y += bird.velocity;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // DAY/NIGHT SAME
    if(Math.floor(score/5)%2===0){
        ctx.fillStyle="skyblue";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    } else {
        ctx.fillStyle="#1a1a2e";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // PIPES
    pipes.forEach(p=>{
        p.x -= pipeSpeed;

        ctx.fillStyle="green";
        ctx.fillRect(p.x,0,p.width,p.top);
        ctx.fillRect(p.x,canvas.height-p.bottom,p.width,p.bottom);

        if(!p.passed && p.x < bird.x){
            score++;
            p.passed=true;
        }

        if(
            bird.x < p.x+p.width &&
            bird.x+bird.width > p.x &&
            (bird.y < p.top || bird.y+bird.height > canvas.height-p.bottom)
        ){
            endGame();
        }
    });

    // 🟢 BIRD DRAW FIX
    ctx.drawImage(birdImg, bird.x, bird.y, bird.width, bird.height);

    // SCORE
    ctx.fillStyle="black";
    ctx.font="25px Arial";
    ctx.fillText("Score: "+score,20,40);

    animationId=requestAnimationFrame(update);
}

// JUMP
document.addEventListener("click",()=>{
    if(gameStarted && !gameOver && !paused){
        bird.velocity = -5;
    }
});

// BUTTONS
playBtn.onclick=startGame;

pauseBtn.onclick=()=>{
    if(!gameStarted || gameOver) return;

    paused=!paused;

    if(paused){
        clearInterval(pipeInterval);
        cancelAnimationFrame(animationId);
        pauseBtn.innerHTML="▶";
    } else {
        pipeInterval=setInterval(createPipe,2700);
        animationId=requestAnimationFrame(update);
        pauseBtn.innerHTML="⏸";
    }
};

restartBtn.onclick=startGame;

homeBtn.onclick=()=>{
    cancelAnimationFrame(animationId);
    clearInterval(pipeInterval);

    titleScreen.style.display="flex";
    restartBtn.style.display="none";
    homeBtn.style.display="none";
    pauseBtn.style.display="none";
};

// NAV
settingsBtnMain.onclick=()=>{
    titleScreen.style.display="none";
    settingsScreen.style.display="flex";
};
backBtn.onclick=()=>{
    settingsScreen.style.display="none";
    titleScreen.style.display="flex";
};
storeBtn.onclick=()=>{
    titleScreen.style.display="none";
    storeScreen.style.display="flex";
};
backStoreBtn.onclick=()=>{
    storeScreen.style.display="none";
    titleScreen.style.display="flex";
};
      </script>
