<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird Pro</title>
<style>
body{
    margin:0;
    text-align:center;
    background:#70c5ce;
    font-family:sans-serif;
}
canvas{
    background:#70c5ce;
    display:block;
    margin:auto;
}
button{
    padding:8px 15px;
    font-size:16px;
    margin:5px;
    border:none;
    border-radius:8px;
}
#pauseBtn{
    position:absolute;
    top:15px;
    right:15px;
    width:45px;
    height:45px;
    border-radius:50%;
    font-size:20px;
    display:none;
}
#store{
    display:none;
    background:white;
    padding:10px;
}
.skinBox{
    display:inline-block;
    margin:10px;
    padding:10px;
    border:2px solid #ccc;
    border-radius:10px;
}
.skinBox img{
    width:60px;
    height:60px;
}
</style>
</head>
<body>

<h2>Flappy Bird Pro</h2>
<canvas id="game" width="350" height="500"></canvas>

<br>
<button id="startBtn">Start</button>
<button id="restartBtn" style="display:none;">Restart</button>
<button id="homeBtn" style="display:none;">Home</button>
<button id="pauseBtn">⏸️</button>
<button onclick="openStore()">Store</button>

<div id="store"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let birdY = 200;
let velocity = 0;
let gravity = 0.5;
let pipes = [];
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
let gameOver = false;
let paused = false;
let pipeInterval;

const skins = [
{name:"Bird", file:"Picsart_26-02-26_17-30-25-252.png", unlockScore:0},
{name:"Mango Bird", file:"Picsart_26-02-27_01-28-33-302.png", unlockScore:10},
{name:"Happy Perrot", file:"Picsart_26-02-27_10-16-34-761.png", unlockScore:20},
{name:"Angry Bird", file:"Picsart_26-02-27_10-15-45-688.png", unlockScore:30}
];

let skinData = JSON.parse(localStorage.getItem("fluppySkins")) || {};
skins.forEach(s=>{
    if(!skinData[s.name]){
        skinData[s.name] = {
            unlocked: s.unlockScore===0,
            selected: s.unlockScore===0
        }
    }
});
localStorage.setItem("fluppySkins",JSON.stringify(skinData));

let selectedSkin = skins.find(s=>skinData[s.name].selected);
let birdImg = new Image();
birdImg.src = selectedSkin.file;

function startGame(){
    document.getElementById("pauseBtn").style.display="inline-block";
    document.getElementById("startBtn").style.display="none";
    score=0;
    birdY=200;
    velocity=0;
    pipes=[];
    gameOver=false;
    paused=false;
    pipeInterval=setInterval(createPipe,2000);
    loop();
}

function createPipe(){
    let top = Math.random()*250;
    pipes.push({x:350,top:top});
}

function loop(){
    if(gameOver) return;
    if(paused){ requestAnimationFrame(loop); return; }

    ctx.clearRect(0,0,350,500);

    velocity+=gravity;
    birdY+=velocity;

    ctx.drawImage(birdImg,50,birdY,40,40);

    pipes.forEach(p=>{
        p.x-=2;
        ctx.fillStyle="green";
        ctx.fillRect(p.x,0,40,p.top);
        ctx.fillRect(p.x,p.top+120,40,500);

        if(p.x===48) score++;

        if(
            (birdY < p.top || birdY+40 > p.top+120) &&
            p.x<90 && p.x>40
        ){
            endGame();
        }
    });

    if(birdY>460) endGame();

    ctx.fillStyle="black";
    ctx.fillText("Score: "+score,10,20);
    ctx.fillText("High: "+highScore,10,40);

    requestAnimationFrame(loop);
}

function endGame(){
    gameOver=true;
    clearInterval(pipeInterval);
    document.getElementById("restartBtn").style.display="inline-block";
    document.getElementById("homeBtn").style.display="inline-block";
    document.getElementById("pauseBtn").style.display="none";

    if(score>highScore){
        highScore=score;
        localStorage.setItem("highScore",highScore);
    }

    skins.forEach(s=>{
        if(score>=s.unlockScore){
            skinData[s.name].unlocked=true;
        }
    });

    localStorage.setItem("fluppySkins",JSON.stringify(skinData));
}

document.addEventListener("keydown",()=>{
    velocity=-8;
});

document.getElementById("restartBtn").onclick=()=>{
    document.getElementById("restartBtn").style.display="none";
    document.getElementById("homeBtn").style.display="none";
    startGame();
};

document.getElementById("homeBtn").onclick=()=>{
    location.reload();
};

document.getElementById("pauseBtn").onclick=()=>{
    paused=!paused;
    const btn=document.getElementById("pauseBtn");
    if(paused){
        btn.innerHTML="▶️";
    }else{
        btn.innerHTML="⏸️";
    }
};

function openStore(){
    let store=document.getElementById("store");
    store.innerHTML="";
    store.style.display="block";

    skins.forEach(s=>{
        let box=document.createElement("div");
        box.className="skinBox";

        let img=document.createElement("img");
        img.src=s.file;

        let btn=document.createElement("button");

        if(skinData[s.name].unlocked){
            btn.innerText="Select";
            btn.onclick=()=>{
                Object.keys(skinData).forEach(k=>skinData[k].selected=false);
                skinData[s.name].selected=true;
                localStorage.setItem("fluppySkins",JSON.stringify(skinData));
                location.reload();
            }
        }else{
            btn.innerText="Unlock at "+s.unlockScore;
            btn.disabled=true;
        }

        box.appendChild(img);
        box.appendChild(document.createElement("br"));
        box.appendChild(btn);
        store.appendChild(box);
    });
}

document.getElementById("startBtn").onclick=startGame;
</script>

</body>
</html>
