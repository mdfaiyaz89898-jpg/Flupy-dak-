<!DOCTYPE html>
<html>
<head>
<title>Fluppy Bird with Store & Skins</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{ margin:0; overflow:hidden; font-family:Arial; background:skyblue;}
canvas{ display:block; }

/* Screens */
#titleScreen, #settingsScreen, #storeScreen{ position:absolute; width:100%; height:100%; top:0; left:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
#titleScreen{ background:skyblue; }
#titleScreen h1{ font-size:60px; color:yellow; text-shadow:4px 4px 0 black,8px 8px 0 orange; font-family:'Comic Sans MS', cursive; animation:bounce 1s infinite alternate; margin-bottom:30px;}
@keyframes bounce{0%{transform:translateY(0px);}100%{transform:translateY(-10px);}}
#titleScreen button, #settingsScreen button, #storeScreen button{ padding:12px 30px; font-size:20px; border:none; border-radius:12px; margin:8px; cursor:pointer; transition:0.2s; }
#titleScreen button:hover, #settingsScreen button:hover, #storeScreen button:hover{ transform:scale(1.1);}
#playBtn{ background:linear-gradient(45deg,#ffeb3b,#fbc02d); color:#000; font-weight:bold; box-shadow:3px 3px 0 #ffa000;}
#settingsBtnMain{ background:linear-gradient(45deg,#ff9800,#f57c00); color:white; font-weight:bold; box-shadow:3px 3px 0 #e65100;}
#storeBtn{ background:linear-gradient(45deg,#4fc3f7,#0288d1); color:white; font-weight:bold; box-shadow:3px 3px 0 #0277bd;}

/* Settings Screen */
#settingsScreen{ background:#f0f0f0; display:none; flex-direction:column; justify-content:flex-start; padding-top:60px; width:100%; height:100%; }
#settingsScreen h2{ margin-bottom:20px; }
#settingsScreen .backBtn{ position:absolute; top:10px; left:10px; font-size:25px; background:transparent; color:orange; border:none; cursor:pointer; }

/* Store Screen */
#storeScreen{ background:#d0f0f0; display:none; flex-direction:column; justify-content:flex-start; padding-top:40px; width:100%; height:100%; }
#storeScreen h2{ font-size:32px; margin-bottom:20px; color:#333;}
#storeScreen .backStoreBtn{ position:absolute; top:10px; left:10px; font-size:30px; background:transparent; color:orange; border:none; cursor:pointer; }
.skinRow{ display:flex; justify-content:center; margin:15px 0; flex-wrap:wrap; }
.skinBox{ width:120px; margin:0 10px; text-align:center; cursor:pointer; border-radius:10px; padding:6px; position:relative; }
.skinBox img{ width:100px; height:100px; border-radius:10px; }
.lockOverlay{ position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); border-radius:10px; display:flex; align-items:center; justify-content:center; color:white; font-size:30px; }
.confirmBtn{ padding:6px 20px; font-size:16px; border:none; border-radius:6px; cursor:pointer; margin-top:5px; font-weight:bold; }
.confirmBtn.locked{ background:grey; color:white; cursor:not-allowed; }
.confirmBtn.unlocked{ background:green; color:white; }

/* In-Game UI */
#pauseBtn, #restartBtn, #homeBtn{ position:absolute; top:10px; padding:8px 12px; border:none; border-radius:8px; font-size:16px; cursor:pointer; font-weight:bold; }
#pauseBtn{ right:10px; display:none; background:#ccc; color:#333; }
#pauseBtn::after{ content:"⏸"; font-size:18px; }
#restartBtn{ display:none; top:50%; left:50%; transform:translate(-50%,-50%); background:linear-gradient(45deg,#ff5722,#e64a19); color:white; box-shadow:3px 3px 0 #b71c1c;}
#homeBtn{ display:none; top:50%; left:50%; transform:translate(-50%,70%); background:linear-gradient(45deg,#03a9f4,#0288d1); color:white; box-shadow:3px 3px 0 #01579b;}
#madeBy{ position:absolute; bottom:10px; left:10px; font-size:14px; }
</style>
</head>
<body>

<!-- SAME HTML AS YOURS (UNCHANGED) -->

<canvas id="gameCanvas"></canvas>
<button id="pauseBtn"></button>
<button id="restartBtn">Restart</button>
<button id="homeBtn">Home</button>

<script>

/* ====== TERA SARA CODE SAME HAI ====== */
/* Bas endGame() change hua hai 👇 */

function endGame(){
    gameOver = true;
    clearInterval(pipeInterval);
    restartBtn.style.display="block";
    homeBtn.style.display="block";
    pauseBtn.style.display="none";

    if(score > highScore){ 
        highScore = score; 
        localStorage.setItem("fluppyHighScore", highScore);
    }

    // 🔥 INSTANT SKIN UNLOCK FIX
    let updated = false;
    skins.forEach(s=>{
        if(score >= s.unlockScore && !skinData[s.name].unlocked){
            skinData[s.name].unlocked = true;
            updated = true;
        }
    });

    if(updated){
        localStorage.setItem("fluppySkins", JSON.stringify(skinData));
    }
}

</script>
</body>
</html>
