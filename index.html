<!DOCTYPE html>
<html>
<head>
<title>Flappy Bird</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    background:skyblue;
    font-family: Arial;
}
canvas{
    display:block;
}
button{
    position:absolute;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:orange;
    color:white;
}
#startBtn{
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}
#restartBtn{
    top:60%;
    left:50%;
    transform:translate(-50%,-50%);
    display:none;
}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<button id="startBtn">Play</button>
<button id="restartBtn">Restart</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");

const birdImg = new Image();
birdImg.src = "Picsart_26-02-26_17-30-25-252.png";

let bird, gravity, velocity, pipes, score, highScore, gameOver, gameStarted;

highScore = localStorage.getItem("highScore") || 0;

function initGame(){
    bird = { x:100, y:200, width:60, height:60 };
    gravity = 0.6;
    velocity = 0;
    pipes = [];
    score = 0;
    gameOver = false;
}

function createPipe(){
    let gap = 170;
    let topHeight = Math.random() * (canvas.height - gap - 200) + 50;

    pipes.push({
        x: canvas.width,
        width: 60,
        top: topHeight,
        bottom: canvas.height - topHeight - gap,
        passed:false
    });
}

let pipeInterval;

function startGame(){
    initGame();
    gameStarted = true;
    startBtn.style.display="none";
    restartBtn.style.display="none";
    pipeInterval = setInterval(createPipe,2000);
    update();
}

function endGame(){
    gameOver = true;
    restartBtn.style.display="block";

    if(score > highScore){
        highScore = score;
        localStorage.setItem("highScore", highScore);
    }
}

function update(){

    if(!gameStarted) return;

    if(gameOver){
        ctx.fillStyle="red";
        ctx.font="40px Arial";
        ctx.fillText("Game Over", canvas.width/2-110, canvas.height/2-50);
        return;
    }

    velocity += gravity;
    bird.y += velocity;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Title
    ctx.fillStyle="black";
    ctx.font="35px Arial";
    ctx.fillText("Flappy Bird",20,50);

    ctx.font="20px Arial";
    ctx.fillText("Made by TrollHunter",20,80);

    // Bird
    ctx.drawImage(birdImg,bird.x,bird.y,bird.width,bird.height);

    pipes.forEach(pipe=>{
        pipe.x -= 3;

        ctx.fillStyle="green";
        ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
        ctx.fillRect(pipe.x,canvas.height-pipe.bottom,pipe.width,pipe.bottom);

        // Collision
        if(
            bird.x < pipe.x + pipe.width &&
            bird.x + bird.width > pipe.x &&
            (bird.y < pipe.top || bird.y + bird.height > canvas.height - pipe.bottom)
        ){
            clearInterval(pipeInterval);
            endGame();
        }

        // Score
        if(!pipe.passed && pipe.x + pipe.width < bird.x){
            score++;
            pipe.passed = true;
        }
    });

    if(bird.y + bird.height > canvas.height || bird.y < 0){
        clearInterval(pipeInterval);
        endGame();
    }

    // Score Display
    ctx.fillStyle="black";
    ctx.font="30px Arial";
    ctx.fillText("Score: "+score,20,120);
    ctx.fillText("High Score: "+highScore,20,160);

    requestAnimationFrame(update);
}

document.addEventListener("click",function(){
    if(gameStarted && !gameOver){
        velocity = -10;
    }
});

startBtn.addEventListener("click",startGame);
restartBtn.addEventListener("click",startGame);

</script>

</body>
</html>
