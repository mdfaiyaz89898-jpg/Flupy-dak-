<!DOCTYPE html>
<html>
<head>
<title>Fluppy Bird FIXED</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{ margin:0; overflow:hidden; font-family:Arial; background:skyblue;}
canvas{ display:block; }

/* Screens */
#titleScreen, #settingsScreen, #storeScreen{
position:absolute; width:100%; height:100%; top:0; left:0;
display:flex; flex-direction:column; align-items:center; justify-content:center;
}

#settingsScreen, #storeScreen{ display:none; }

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:12px;
margin:8px;
cursor:pointer;
}

/* Store */
.skinRow{
display:flex;
overflow-x:auto;
gap:15px;
padding:20px;
}

.skinBox{
min-width:120px;
text-align:center;
cursor:pointer;
}

.skinBox img{
width:100px;
height:100px;
}

/* Game buttons */
#pauseBtn{ position:absolute; top:10px; right:10px; display:none; }
#restartBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
}
#homeBtn{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
display:none;
}
</style>
</head>

<body>

<div id="titleScreen">
<h1>Fluppy Bird</h1>
<button id="playBtn">Play</button>
<button id="settingsBtnMain">Settings</button>
<button id="storeBtn">Store</button>
</div>

<div id="settingsScreen">
<h2>Select Difficulty</h2>
<label><input type="radio" name="difficulty" value="Very Easy"> Very Easy</label>
<label><input type="radio" name="difficulty" value="Normal"> Normal</label>
<label><input type="radio" name="difficulty" value="Hard"> Hard</label>
<button onclick="goHome()">Back</button>
</div>

<div id="storeScreen">
<h2>Store</h2>
<div class="skinRow" id="skinRow"></div>
<button onclick="goHome()">Back</button>
</div>

<canvas id="gameCanvas"></canvas>

<button id="pauseBtn">⏸</button>
<button id="restartBtn">Restart</button>
<button id="homeBtn">Home</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

// UI
const titleScreen = document.getElementById("titleScreen");
const settingsScreen = document.getElementById("settingsScreen");
const storeScreen = document.getElementById("storeScreen");
const pauseBtn = document.getElementById("pauseBtn");
const restartBtn = document.getElementById("restartBtn");
const homeBtn = document.getElementById("homeBtn");

// GAME VARS
let bird, pipes, score;
let gameOver=false, started=false, paused=false;
let pipeSpeed=2, baseSpeed=2;
let gap=280;
let pipeTimer=0;
let animationId;

// stars (FIXED)
let stars = Array.from({length:50},()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height/2
}));

// difficulty
let difficulty = localStorage.getItem("diff") || "Very Easy";
const gaps = {"Very Easy":280,"Normal":200,"Hard":150};

// skins
let skins=[
{name:"Bird",file:"Picsart_26-02-26_17-30-25-252.png",unlock:0},
{name:"Mango",file:"Picsart_26-02-27_01-28-33-302.png",unlock:10},
{name:"Parrot",file:"Picsart_26-02-27_10-16-34-761.png",unlock:20}
];

let selectedSkin=skins[0];

// IMAGE FIX (IMPORTANT)
let birdImg=new Image();
birdImg.src=selectedSkin.file;

// INIT
function init(){
bird={x:100,y:200,v:0};
pipes=[];
score=0;
gameOver=false;
paused=false;
pipeSpeed=baseSpeed;
gap=gaps[difficulty];
pipeTimer=0;
}

// GAME LOOP
function update(){

if(!started) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

if(!paused && !gameOver){

// physics
bird.v+=0.4;
bird.y+=bird.v;

// DAY NIGHT
if(Math.floor(score/5)%2==0){
ctx.fillStyle="skyblue";
ctx.fillRect(0,0,canvas.width,canvas.height);

// sun
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(canvas.width-100,100,40,0,Math.PI*2);
ctx.fill();

}else{
ctx.fillStyle="#111";
ctx.fillRect(0,0,canvas.width,canvas.height);

// stars
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.fillRect(s.x,s.y,2,2);
});

// moon
ctx.beginPath();
ctx.arc(canvas.width-100,100,30,0,Math.PI*2);
ctx.fill();
}

// PIPE SPAWN FIX
pipeTimer++;
if(pipeTimer>120){
let top=Math.random()*(canvas.height-gap-100)+50;
pipes.push({x:canvas.width,top:top,passed:false});
pipeTimer=0;
}

// pipes
pipes.forEach(p=>{
p.x-=pipeSpeed;

ctx.fillStyle="green";
ctx.fillRect(p.x,0,60,p.top);
ctx.fillRect(p.x,p.top+gap,60,canvas.height);

// collision
if(bird.x < p.x+60 && bird.x+40 > p.x){
if(bird.y < p.top || bird.y+40 > p.top+gap){
gameOver=true;
}
}

// score + speed
if(!p.passed && p.x<bird.x){
score++;
p.passed=true;
pipeSpeed+=0.1;
}
});

// bird
ctx.drawImage(birdImg,bird.x,bird.y,40,40);

// UI
ctx.fillStyle="black";
ctx.font="20px Arial";
ctx.fillText("Score: "+score,20,30);

// ground hit
if(bird.y>canvas.height){
gameOver=true;
}
}

// GAME OVER UI FIX
if(gameOver){
restartBtn.style.display="block";
homeBtn.style.display="block";
pauseBtn.style.display="none";
}

animationId=requestAnimationFrame(update);
}

// CONTROLS
document.addEventListener("click",()=>{
if(started && !paused) bird.v=-6;
});

// PLAY
document.getElementById("playBtn").onclick=()=>{
cancelAnimationFrame(animationId);
titleScreen.style.display="none";
pauseBtn.style.display="block";

started=true;
init();
update();
};

// PAUSE FIX
pauseBtn.onclick=()=>{
paused=!paused;
pauseBtn.textContent=paused?"▶":"⏸";
};

// RESTART FIX
restartBtn.onclick=()=>{
restartBtn.style.display="none";
homeBtn.style.display="none";
init();
};

// HOME FIX
homeBtn.onclick=()=>{
started=false;
titleScreen.style.display="flex";
restartBtn.style.display="none";
homeBtn.style.display="none";
pauseBtn.style.display="none";
};

// NAV
document.getElementById("settingsBtnMain").onclick=()=>{
titleScreen.style.display="none";
settingsScreen.style.display="flex";
};

document.getElementById("storeBtn").onclick=()=>{
titleScreen.style.display="none";
storeScreen.style.display="flex";
renderStore();
};

function goHome(){
settingsScreen.style.display="none";
storeScreen.style.display="none";
titleScreen.style.display="flex";
}

// DIFFICULTY
document.querySelectorAll('input[name="difficulty"]').forEach(r=>{
r.onchange=()=>{
difficulty=r.value;
localStorage.setItem("diff",difficulty);
};
});

// STORE
function renderStore(){
let row=document.getElementById("skinRow");
row.innerHTML="";
skins.forEach(s=>{
let box=document.createElement("div");
box.className="skinBox";

let img=document.createElement("img");
img.src=s.file;

box.appendChild(img);

box.onclick=()=>{
selectedSkin=s;
birdImg.src=s.file;
};

row.appendChild(box);
});
}

</script>

</body>
</html>
