<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluppy Bird</title>
<style>
body{margin:0;font-family:Arial;background:skyblue;overflow:hidden;}
.screen{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
}
button{
padding:12px 25px;font-size:18px;
margin:10px;border:none;border-radius:10px;
cursor:pointer;
}
input{
padding:10px;font-size:18px;
border-radius:8px;border:1px solid black;
margin-bottom:20px;
}
canvas{display:none;background:skyblue;}
.storeItem{
background:white;padding:10px 20px;
border-radius:10px;margin:8px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen">
<h2>Enter Username</h2>
<input type="text" id="usernameInput">
<button id="loginBtn">Login</button>
</div>

<!-- TITLE -->
<div id="titleScreen" class="screen" style="display:none;">
<h1>Fluppy Bird</h1>
<button id="playBtn">Play</button>
<button id="storeBtn">Store</button>
<button id="settingsBtn">Settings</button>
</div>

<!-- STORE -->
<div id="storeScreen" class="screen" style="display:none;">
<h2>Store (Use Score)</h2>
<div id="storeItems"></div>
<button onclick="goHome()">Back</button>
</div>

<!-- SETTINGS -->
<div id="settingsScreen" class="screen" style="display:none;">
<h2>Select Difficulty</h2>
<button onclick="setDifficulty(2)">Easy</button>
<button onclick="setDifficulty(3)">Medium</button>
<button onclick="setDifficulty(4)">Hard</button>
<button onclick="goHome()">Back</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const loginScreen = document.getElementById("loginScreen");
const titleScreen = document.getElementById("titleScreen");
const storeScreen = document.getElementById("storeScreen");
const settingsScreen = document.getElementById("settingsScreen");
const storeItems = document.getElementById("storeItems");

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let playerName = localStorage.getItem("playerName");
let selectedSkin = localStorage.getItem("selectedSkin") || "bird";
let unlockedSkins = JSON.parse(localStorage.getItem("unlockedSkins")) || ["bird"];
let difficulty = parseInt(localStorage.getItem("difficulty")) || 3;
let highScore = parseInt(localStorage.getItem("highScore")) || 0;

let bird, pipes=[], score=0, gameInterval, pipeInterval, countdownInterval;
let gravity = 0.5;
let gameRunning = false;

const skins = [
{name:"bird", price:0, color:"yellow"},
{name:"red", price:5, color:"red"},
{name:"blue", price:10, color:"blue"},
{name:"green", price:15, color:"green"}
];

// LOGIN FLOW
if(playerName){
loginScreen.style.display="none";
titleScreen.style.display="flex";
}else{
loginScreen.style.display="flex";
}

document.getElementById("loginBtn").onclick = function(){
let name = document.getElementById("usernameInput").value.trim();
if(name){
localStorage.setItem("playerName",name);
playerName=name;
loginScreen.style.display="none";
titleScreen.style.display="flex";
}
};

// PLAY
document.getElementById("playBtn").onclick = function(){
startCountdown();
};

function startCountdown(){
titleScreen.style.display="none";
canvas.style.display="block";
let count=3;
ctx.font="60px Arial";
countdownInterval=setInterval(()=>{
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillText(count,canvas.width/2,canvas.height/2);
count--;
if(count<0){
clearInterval(countdownInterval);
startGame();
}
},1000);
}

function startGame(){
bird={x:100,y:200,width:40,height:40,velocity:0};
pipes=[];score=0;gameRunning=true;
gameInterval=setInterval(updateGame,1000/60);
pipeInterval=setInterval(createPipe,2000);
}

function createPipe(){
let gap=180;
let top=Math.random()*(canvas.height-gap-100)+50;
pipes.push({x:canvas.width,width:60,top:top,bottom:canvas.height-top-gap});
}

function updateGame(){
ctx.clearRect(0,0,canvas.width,canvas.height);

bird.velocity+=gravity;
bird.y+=bird.velocity;

let skinObj=skins.find(s=>s.name===selectedSkin);
ctx.fillStyle=skinObj.color;
ctx.fillRect(bird.x,bird.y,bird.width,bird.height);

pipes.forEach(pipe=>{
pipe.x-=difficulty;
ctx.fillStyle="green";
ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
ctx.fillRect(pipe.x,canvas.height-pipe.bottom,pipe.width,pipe.bottom);

if(
bird.x < pipe.x+pipe.width &&
bird.x+bird.width > pipe.x &&
(bird.y < pipe.top || bird.y+bird.height > canvas.height-pipe.bottom)
){
endGame();
}

if(pipe.x+pipe.width===bird.x){
score++;
}
});

if(bird.y+bird.height>canvas.height){
endGame();
}

ctx.fillStyle="black";
ctx.font="25px Arial";
ctx.fillText("Score: "+score,20,40);
ctx.fillText("High: "+highScore,20,70);
}

function endGame(){
clearInterval(gameInterval);
clearInterval(pipeInterval);
gameRunning=false;

if(score>highScore){
highScore=score;
localStorage.setItem("highScore",highScore);
}

setTimeout(()=>{
if(confirm("Game Over\nScore: "+score+"\nRestart?")){
startCountdown();
}else{
goHome();
}
},100);
}

document.addEventListener("click",function(){
if(gameRunning){
bird.velocity=-8;
}
});

// STORE
document.getElementById("storeBtn").onclick=function(){
titleScreen.style.display="none";
storeScreen.style.display="flex";
renderStore();
};

function renderStore(){
storeItems.innerHTML="";
skins.forEach(skin=>{
let div=document.createElement("div");
div.className="storeItem";
let status=unlockedSkins.includes(skin.name)?"Select":"Unlock ("+skin.price+")";
div.innerHTML=skin.name+" - "+status;
div.onclick=function(){
if(unlockedSkins.includes(skin.name)){
selectedSkin=skin.name;
localStorage.setItem("selectedSkin",skin.name);
alert("Selected!");
}else{
if(highScore>=skin.price){
unlockedSkins.push(skin.name);
localStorage.setItem("unlockedSkins",JSON.stringify(unlockedSkins));
alert("Unlocked!");
renderStore();
}else{
alert("Not enough Score");
}
}
};
storeItems.appendChild(div);
});
}

// SETTINGS
document.getElementById("settingsBtn").onclick=function(){
titleScreen.style.display="none";
settingsScreen.style.display="flex";
};

function setDifficulty(value){
difficulty=value;
localStorage.setItem("difficulty",value);
alert("Difficulty Set!");
}

// HOME
function goHome(){
canvas.style.display="none";
storeScreen.style.display="none";
settingsScreen.style.display="none";
titleScreen.style.display="flex";
}

</script>
</body>
</html>
