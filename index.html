<!DOCTYPE html>
<html>
<head>
<title>Fluppy Bird</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    background:skyblue;
    font-family: Arial;
}

/* Cartoon Style Title */
#title{
    position:absolute;
    top:20%;
    width:100%;
    text-align:center;
    font-size:60px;
    font-weight:bold;
    color:yellow;
    text-shadow:
        4px 4px 0px black,
        8px 8px 0px orange;
    font-family: 'Comic Sans MS', cursive;
    animation: bounce 1s infinite alternate;
}

@keyframes bounce{
    from{ transform: translateY(0px); }
    to{ transform: translateY(-10px); }
}

/* Start / Restart Button */
#startBtn, #restartBtn{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    padding:12px 30px;
    font-size:20px;
    border:none;
    border-radius:8px;
    background:orange;
    color:white;
}

#startBtn{
    top:45%;
}

#restartBtn{
    top:45%;
    display:none;
}

/* Made by text */
#madeBy{
    position:absolute;
    bottom:15px;
    left:15px;
    font-size:14px;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<div id="title">Fluppy Bird</div>
<button id="startBtn">Play</button>
<button id="restartBtn">Restart</button>
<div id="madeBy">Made by TrollHunter</div>

<canvas id="gameCanvas"></canvas>

<!-- New JS file linked here -->
<script src="gameV2.js"></script>

</body>
</html>
