<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// SAFE ELEMENT GET
function get(id){ return document.getElementById(id) || null; }

const titleScreen = get("titleScreen");
const settingsScreen = get("settingsScreen");
const storeScreen = get("storeScreen");

const playBtn = get("playBtn");
const settingsBtnMain = get("settingsBtnMain");
const storeBtn = get("storeBtn");

const backBtn = document.querySelector(".backBtn");
const backStoreBtn = document.querySelector(".backStoreBtn");

const pauseBtn = get("pauseBtn");
const restartBtn = get("restartBtn");
const homeBtn = get("homeBtn");

// GAME VARS
let bird, pipes, score;
let gravity = 0.35;
let pipeSpeed = 2;

let gameStarted = false;
let gameOver = false;
let paused = false;

let pipeInterval;
let animationId;

// IMAGE FIX
let birdImg = new Image();
birdImg.src = "Picsart_26-02-26_17-30-25-252.png";

// INIT
function initGame(){
    bird = {x:100,y:200,width:60,height:60,velocity:0};
    pipes = [];
    score = 0;
    gameOver = false;
    paused = false;
}

// PIPE
function createPipe(){
    let gap = 220;
    let top = Math.random()*(canvas.height-gap-100)+50;

    pipes.push({
        x:canvas.width,
        width:60,
        top:top,
        bottom:canvas.height-top-gap,
        passed:false
    });
}

// START
function startGame(){
    cancelAnimationFrame(animationId);
    clearInterval(pipeInterval);

    initGame();
    gameStarted=false;

    if(titleScreen) titleScreen.style.display="none";
    if(settingsScreen) settingsScreen.style.display="none";
    if(storeScreen) storeScreen.style.display="none";

    if(restartBtn) restartBtn.style.display="none";
    if(homeBtn) homeBtn.style.display="none";
    if(pauseBtn) pauseBtn.style.display="none";

    // COUNTDOWN
    let count=["3","2","1","Go!"];
    let i=0;

    let overlay=document.createElement("div");
    overlay.style="position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:120px;color:white;background:rgba(0,0,0,0.3);z-index:999";
    document.body.appendChild(overlay);

    let int=setInterval(()=>{
        overlay.innerText=count[i++];
        if(i===count.length){
            clearInterval(int);
            document.body.removeChild(overlay);

            gameStarted=true;
            if(pauseBtn) pauseBtn.style.display="block";

            pipeInterval=setInterval(createPipe,2700);
            animationId=requestAnimationFrame(update);
        }
    },1000);
}

// END
function endGame(){
    gameOver=true;

    clearInterval(pipeInterval);
    cancelAnimationFrame(animationId);

    if(restartBtn) restartBtn.style.display="block";
    if(homeBtn) homeBtn.style.display="block";
    if(pauseBtn) pauseBtn.style.display="none";
}

// UPDATE
function update(){
    if(!gameStarted || gameOver || paused) return;

    bird.velocity += gravity;
    bird.y += bird.velocity;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="skyblue";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    pipes.forEach(p=>{
        p.x -= pipeSpeed;

        ctx.fillStyle="green";
        ctx.fillRect(p.x,0,p.width,p.top);
        ctx.fillRect(p.x,canvas.height-p.bottom,p.width,p.bottom);

        if(!p.passed && p.x < bird.x){
            score++;
            p.passed=true;
        }

        if(
            bird.x < p.x+p.width &&
            bird.x+bird.width > p.x &&
            (bird.y < p.top || bird.y+bird.height > canvas.height-p.bottom)
        ){
            endGame();
        }
    });

    ctx.drawImage(birdImg, bird.x, bird.y, bird.width, bird.height);

    ctx.fillStyle="black";
    ctx.font="25px Arial";
    ctx.fillText("Score: "+score,20,40);

    animationId=requestAnimationFrame(update);
}

// JUMP
document.addEventListener("click",()=>{
    if(gameStarted && !gameOver && !paused){
        bird.velocity = -5;
    }
});

// BUTTONS SAFE
if(playBtn) playBtn.onclick=startGame;

if(pauseBtn) pauseBtn.onclick=()=>{
    if(!gameStarted || gameOver) return;

    paused=!paused;

    if(paused){
        clearInterval(pipeInterval);
        cancelAnimationFrame(animationId);
        pauseBtn.innerHTML="▶";
    } else {
        pipeInterval=setInterval(createPipe,2700);
        animationId=requestAnimationFrame(update);
        pauseBtn.innerHTML="⏸";
    }
};

if(restartBtn) restartBtn.onclick=startGame;

if(homeBtn) homeBtn.onclick=()=>{
    cancelAnimationFrame(animationId);
    clearInterval(pipeInterval);

    if(titleScreen) titleScreen.style.display="flex";
    if(restartBtn) restartBtn.style.display="none";
    if(homeBtn) homeBtn.style.display="none";
    if(pauseBtn) pauseBtn.style.display="none";
};

// NAV SAFE
if(settingsBtnMain) settingsBtnMain.onclick=()=>{
    if(titleScreen) titleScreen.style.display="none";
    if(settingsScreen) settingsScreen.style.display="flex";
};

if(backBtn) backBtn.onclick=()=>{
    if(settingsScreen) settingsScreen.style.display="none";
    if(titleScreen) titleScreen.style.display="flex";
};

if(storeBtn) storeBtn.onclick=()=>{
    if(titleScreen) titleScreen.style.display="none";
    if(storeScreen) storeScreen.style.display="flex";
};

if(backStoreBtn) backStoreBtn.onclick=()=>{
    if(storeScreen) storeScreen.style.display="none";
    if(titleScreen) titleScreen.style.display="flex";
};
</script>
