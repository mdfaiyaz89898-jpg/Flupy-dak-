<!DOCTYPE html>
<html>
<head>
<title>Flupy Dak 🐤</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
overflow:hidden;
background:linear-gradient(skyblue,white);
}
canvas{
display:block;
margin:0 auto;
}
button{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:black;
color:white;
display:none;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<button id="restartBtn">Restart 🔄</button>

<audio id="jumpSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="hitSound" src="https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg"></audio>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");
let restartBtn = document.getElementById("restartBtn");
let jumpSound = document.getElementById("jumpSound");
let hitSound = document.getElementById("hitSound");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let birdImg = new Image();
birdImg.src = "https://i.imgur.com/QZ7Z8vH.png"; // bird image

let bird, pipes, score, highScore, gameOver;

function init(){
bird = {
x:120,
y:200,
size:40,
gravity:0.5,
lift:-9,
velocity:0
};
pipes = [];
score = 0;
highScore = localStorage.getItem("highScore") || 0;
gameOver = false;
restartBtn.style.display="none";
}

function drawBird(){
ctx.drawImage(birdImg,bird.x-20,bird.y-20,40,40);
}

function drawPipes(){
ctx.fillStyle="green";
pipes.forEach(pipe=>{
ctx.fillRect(pipe.x,0,60,pipe.top);
ctx.fillRect(pipe.x,pipe.bottom,60,canvas.height);

if(
bird.x + 20 > pipe.x &&
bird.x - 20 < pipe.x + 60 &&
(bird.y - 20 < pipe.top ||
 bird.y + 20 > pipe.bottom)
){
endGame();
}

if(!pipe.passed && pipe.x + 60 < bird.x){
pipe.passed = true;
score++;
}
});
}

function update(){
bird.velocity += bird.gravity;
bird.y += bird.velocity;

if(bird.y > canvas.height || bird.y < 0){
endGame();
}

pipes.forEach(pipe=>{
pipe.x -= 3;
});
}

function createPipe(){
if(gameOver) return;
let gap = 170;
let top = Math.random()*(canvas.height/2);
pipes.push({
x:canvas.width,
top:top,
bottom:top+gap,
passed:false
});
}

setInterval(createPipe,1800);

function drawScore(){
ctx.fillStyle="black";
ctx.font="25px Arial";
ctx.fillText("Score: "+score,20,40);
ctx.fillText("High: "+highScore,20,70);
}

function endGame(){
if(score > highScore){
localStorage.setItem("highScore",score);
}
hitSound.play();
gameOver = true;
restartBtn.style.display="block";
}

function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);
drawBird();
drawPipes();
if(!gameOver){
update();
requestAnimationFrame(loop);
}
drawScore();
}

function jump(){
if(!gameOver){
bird.velocity = bird.lift;
jumpSound.play();
}
}

window.addEventListener("click",jump);
window.addEventListener("touchstart",jump);

restartBtn.addEventListener("click",()=>{
init();
loop();
});

init();
loop();
</script>

</body>
</html>
