<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Game</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#70c5ce;
}
canvas{
    display:block;
    margin:auto;
    background:#70c5ce;
}
.pauseBtn{
    position:absolute;
    top:20px;
    right:20px;
    font-size:20px;
    padding:8px 14px;
    cursor:pointer;
}
</style>
</head>
<body>

<button id="pauseBtn" class="pauseBtn">⏸</button>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const pauseBtn = document.getElementById("pauseBtn");

let baseSpeed = 1.5;
let pipeSpeed = baseSpeed;
let gravity = 0.5;
let lift = -8;
let score = 0;
let gameRunning = true;
let pipeInterval;

let selectedSkin = {
    file: "https://i.imgur.com/QZ6XK7S.png"
};

// ✅ PRELOAD BIRD IMAGE (FIX)
let birdImgObj = new Image();
birdImgObj.src = selectedSkin.file;

let bird = {
    x: 80,
    y: 200,
    width: 40,
    height: 40,
    velocity: 0,
    rotation: 0
};

let pipes = [];

function spawnPipe(){
    let gap = 150;
    let topHeight = Math.random()*300+50;

    pipes.push({
        x: canvas.width,
        top: topHeight,
        bottom: topHeight + gap,
        width: 60
    });
}

function startGame(){
    clearInterval(pipeInterval); // ✅ FIX MULTIPLE INTERVAL
    pipes = [];
    score = 0;
    pipeSpeed = baseSpeed;
    bird.y = 200;
    bird.velocity = 0;
    gameRunning = true;
    pipeInterval = setInterval(spawnPipe, 1500);
}

function update(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Bird physics
    bird.velocity += gravity;
    bird.y += bird.velocity;

    if(bird.velocity < 0){
        bird.rotation = -20;
    } else {
        bird.rotation = 20;
    }

    // Draw bird
    ctx.save();
    ctx.translate(bird.x + bird.width/2, bird.y + bird.height/2);
    ctx.rotate(bird.rotation * Math.PI/180);
    ctx.drawImage(birdImgObj, -bird.width/2, -bird.height/2, bird.width, bird.height);
    ctx.restore();

    // Pipes
    ctx.fillStyle = "green";
    pipes.forEach((pipe,index)=>{
        pipe.x -= pipeSpeed;

        ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
        ctx.fillRect(pipe.x,pipe.bottom,pipe.width,canvas.height);

        // Collision
        if(
            bird.x < pipe.x + pipe.width &&
            bird.x + bird.width > pipe.x &&
            (bird.y < pipe.top || bird.y + bird.height > pipe.bottom)
        ){
            gameOver();
        }

        // Score
        if(pipe.x + pipe.width < bird.x){
            score++;
            pipes.splice(index,1);
        }
    });

    // Ground collision
    if(bird.y + bird.height >= canvas.height || bird.y < 0){
        gameOver();
    }

    // Score text
    ctx.fillStyle="white";
    ctx.font="30px Arial";
    ctx.fillText(score, 20, 50);

    requestAnimationFrame(update);
}

function gameOver(){
    gameRunning = false;
    clearInterval(pipeInterval);
}

document.addEventListener("keydown", ()=>{
    if(gameRunning){
        bird.velocity = lift;
    }else{
        startGame();
    }
});

canvas.addEventListener("click", ()=>{
    if(gameRunning){
        bird.velocity = lift;
    }else{
        startGame();
    }
});

// Pause button
pauseBtn.addEventListener("click", ()=>{
    gameRunning = !gameRunning;
    if(gameRunning){
        pauseBtn.innerText="⏸";
        update();
    }else{
        pauseBtn.innerText="▶";
    }
});

startGame();
update();
</script>

</body>
</html>
