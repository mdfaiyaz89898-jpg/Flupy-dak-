<!DOCTYPE html>
<html>
<head>
<title>Fluppy Bird</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{ margin:0; overflow:hidden; background:skyblue; font-family:Arial; }
canvas{ display:block; }

/* Starting Screen */
#titleScreen, #settingsScreen{ position:absolute; width:100%; height:100%; top:0; left:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
#titleScreen{ background:skyblue; }
#titleScreen h1{ font-size:60px; color:yellow; text-shadow:4px 4px 0px black,8px 8px 0px orange; font-family:'Comic Sans MS', cursive; animation:bounce 1s infinite alternate; margin-bottom:30px; }
@keyframes bounce{ 0%{transform:translateY(0px);}100%{transform:translateY(-10px);} }
#titleScreen button, #settingsScreen button{ padding:12px 30px; font-size:20px; border:none; border-radius:8px; margin:8px; background:orange; color:white; cursor:pointer; }
#settingsScreen{ background:#f0f0f0; display:none; flex-direction:column; justify-content:flex-start; padding-top:60px; }
#settingsScreen h2{ margin-bottom:20px; }
#settingsScreen .backBtn{ position:absolute; top:10px; left:10px; font-size:25px; background:transparent; color:orange; border:none; cursor:pointer; }

/* Difficulty Radio Buttons */
#difficultyOptions label{ display:block; margin:10px; font-size:20px; cursor:pointer; }
#difficultyOptions input[type="radio"]{ margin-right:10px; accent-color:orange; }

/* In-Game UI */
#pauseBtn, #restartBtn, #homeBtn{ position:absolute; top:10px; padding:8px 12px; border:none; border-radius:5px; background:orange; color:white; cursor:pointer; }
#pauseBtn{ right:10px; display:none; }
#restartBtn{ display:none; top:50%; left:50%; transform:translate(-50%,-50%); }
#homeBtn{ display:none; top:50%; left:50%; transform:translate(-50%,70%); }

/* Made by */
#madeBy{ position:absolute; bottom:10px; left:10px; font-size:14px; }
</style>
</head>
<body>

<!-- Starting Screen -->
<div id="titleScreen">
    <h1>Fluppy Bird</h1>
    <button id="playBtn">Play</button>
    <button id="settingsBtnMain">Settings</button>
</div>

<!-- Settings Screen -->
<div id="settingsScreen">
    <button class="backBtn">&#8592;</button>
    <h2>Select Difficulty</h2>
    <div id="difficultyOptions">
        <label><input type="radio" name="difficulty" value="Very Easy"> Very Easy</label>
        <label><input type="radio" name="difficulty" value="Normal"> Normal</label>
        <label><input type="radio" name="difficulty" value="Hard"> Hard</label>
    </div>
</div>

<canvas id="gameCanvas"></canvas>
<button id="pauseBtn">Pause</button>
<button id="restartBtn">Restart</button>
<button id="homeBtn">Home</button>
<div id="madeBy">Made by TrollHunter</div>

<script>
// Canvas setup
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Elements
const titleScreen = document.getElementById("titleScreen");
const settingsScreen = document.getElementById("settingsScreen");
const playBtn = document.getElementById("playBtn");
const settingsBtnMain = document.getElementById("settingsBtnMain");
const backBtn = document.querySelector(".backBtn");
const pauseBtn = document.getElementById("pauseBtn");
const restartBtn = document.getElementById("restartBtn");
const homeBtn = document.getElementById("homeBtn");

// Bird image
const birdImg = new Image();
birdImg.src = "Picsart_26-02-26_17-30-25-252.png";

// Game variables
let bird, gravity, pipes, score, highScore, gameOver, gameStarted, paused, pipeSpeed, difficulty;
highScore = localStorage.getItem("fluppyHighScore") || 0;

// Difficulty speeds
const difficultySpeeds = { "Very Easy":2, "Normal":4, "Hard":6 };

// Selected difficulty save
difficulty = localStorage.getItem("fluppyDifficulty") || "Very Easy";

// Initialize game
function initGame(){
    bird = {x:100, y:200, width:60, height:60, velocity:0};
    gravity = 0.4; // Easier gravity
    pipes = [];
    score = 0;
    gameOver = false;
    paused = false;
    pipeSpeed = difficultySpeeds[difficulty];
    document.querySelector(`input[name="difficulty"][value="${difficulty}"]`).checked = true;
}

// Create pipes
function createPipe(){
    const gap = 220; // bigger gap to avoid early out
    const topHeight = Math.random() * (canvas.height - gap - 100) + 50;
    pipes.push({x:canvas.width, width:60, top:topHeight, bottom:canvas.height-topHeight-gap, passed:false});
}

let pipeInterval;

// Start game
function startGame(){
    titleScreen.style.display="none";
    settingsScreen.style.display="none";
    pauseBtn.style.display="block";
    restartBtn.style.display="none";
    homeBtn.style.display="none";

    gameStarted = true;
    initGame();
    pipeInterval = setInterval(createPipe,2000);
    update();
}

// End game
function endGame(){
    gameOver = true;
    clearInterval(pipeInterval);
    restartBtn.style.display="block";
    homeBtn.style.display="block";
    pauseBtn.style.display="none";

    if(score>highScore){ highScore = score; localStorage.setItem("fluppyHighScore",highScore); }
}

// Update loop
function update(){
    if(!gameStarted || gameOver || paused) return;

    bird.velocity += gravity;
    bird.y += bird.velocity;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Bird bounce
    ctx.save();
    const bounce = Math.sin(Date.now()/150)*5;
    ctx.drawImage(birdImg,bird.x,bird.y+bounce,bird.width,bird.height);
    ctx.restore();

    // Pipes
    pipes.forEach(pipe=>{
        pipe.x -= pipeSpeed;
        ctx.fillStyle="green";
        ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
        ctx.fillRect(pipe.x,canvas.height-pipe.bottom,pipe.width,pipe.bottom);

        if(bird.x<pipe.x+pipe.width && bird.x+bird.width>pipe.x && (bird.y<pipe.top || bird.y+bird.height>canvas.height-pipe.bottom)){
            endGame();
        }

        if(!pipe.passed && pipe.x+pipe.width<bird.x){
            score++; pipe.passed=true;
        }
    });

    if(bird.y+bird.height>canvas.height || bird.y<0) endGame();

    // Scores
    ctx.fillStyle="black"; ctx.font="25px Arial";
    ctx.fillText("Score: "+score,20,40);
    ctx.fillText("High Score: "+highScore,20,70);

    requestAnimationFrame(update);
}

// Jump
function jump(){ if(gameStarted && !gameOver) bird.velocity=-10; }
document.addEventListener("click", jump);
document.addEventListener("touchstart", e=>{ e.preventDefault(); jump(); });

// Buttons
playBtn.addEventListener("click",()=>{ startGame(); });
settingsBtnMain.addEventListener("click",()=>{ titleScreen.style.display="none"; settingsScreen.style.display="flex"; });
backBtn.addEventListener("click",()=>{ settingsScreen.style.display="none"; titleScreen.style.display="flex"; });

// Difficulty select
document.querySelectorAll('input[name="difficulty"]').forEach(radio=>{
    radio.addEventListener("change",()=>{
        difficulty = radio.value;
        pipeSpeed = difficultySpeeds[difficulty];
        localStorage.setItem("fluppyDifficulty",difficulty); // save selection
    });
});

// Pause button
pauseBtn.addEventListener("click",()=>{ paused=!paused; if(!paused) update(); });

// Restart button
restartBtn.addEventListener("click",()=>{ startGame(); });
homeBtn.addEventListener("click",()=>{
    titleScreen.style.display="flex";
    restartBtn.style.display="none";
    homeBtn.style.display="none";
    pauseBtn.style.display="none";
});
</script>
</body>
</html>
