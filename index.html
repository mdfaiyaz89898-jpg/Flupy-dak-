<!DOCTYPE html>
<html>
<head>
<title>Fluppy Bird</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{ margin:0; overflow:hidden; font-family:Arial; background:skyblue;}
canvas{ display:block; }

#titleScreen, #storeScreen{
position:absolute; width:100%; height:100%;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
}

#titleScreen h1{
font-size:60px; color:yellow;
text-shadow:4px 4px 0 black,8px 8px 0 orange;
margin-bottom:30px;
}

button{
padding:12px 30px; font-size:20px;
border:none; border-radius:12px;
margin:8px; cursor:pointer;
}

#playBtn{ background:#ffd54f; font-weight:bold; }
#storeBtn{ background:#29b6f6; color:white; }

#storeScreen{ background:#d0f0f0; display:none; }
.skinRow{ display:flex; flex-wrap:wrap; justify-content:center; }
.skinBox{ width:120px; margin:10px; text-align:center; position:relative; cursor:pointer; }
.skinBox img{ width:100px; height:100px; }
.lockOverlay{
position:absolute; top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.5);
display:flex; align-items:center; justify-content:center;
color:white; font-size:30px;
}
.confirmBtn{ padding:8px 20px; border-radius:8px; }
.confirmBtn.locked{ background:grey; color:white; }
.confirmBtn.unlocked{ background:green; color:white; }

#restartBtn,#homeBtn{
position:absolute; top:50%; left:50%;
transform:translate(-50%,-50%);
display:none;
}

#homeBtn{ transform:translate(-50%,40%); }
</style>
</head>
<body>

<div id="titleScreen">
<h1>Fluppy Bird</h1>
<button id="playBtn">Play</button>
<button id="storeBtn">Store</button>
</div>

<div id="storeScreen">
<h2>Choose Skin</h2>
<div id="upperSkinDisplay"></div>
<div class="skinRow" id="skinRow"></div>
<button id="confirmSkinBtn" class="confirmBtn locked">Confirm</button>
<button onclick="backHome()">Back</button>
</div>

<canvas id="gameCanvas"></canvas>
<button id="restartBtn">Restart</button>
<button id="homeBtn">Home</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

const titleScreen=document.getElementById("titleScreen");
const storeScreen=document.getElementById("storeScreen");
const playBtn=document.getElementById("playBtn");
const storeBtn=document.getElementById("storeBtn");
const restartBtn=document.getElementById("restartBtn");
const homeBtn=document.getElementById("homeBtn");
const confirmSkinBtn=document.getElementById("confirmSkinBtn");
const upperSkinDisplay=document.getElementById("upperSkinDisplay");
const skinRow=document.getElementById("skinRow");

let bird, gravity, pipes, score, highScore, gameOver, pipeInterval;
highScore=parseInt(localStorage.getItem("fluppyHighScore"))||0;

// SAFE storage load
let skinData;
try{
skinData=JSON.parse(localStorage.getItem("fluppySkins"))||{};
}catch{ skinData={}; }

let skins=[
{name:"Bird",file:"Picsart_26-02-26_17-30-25-252.png",unlockScore:0},
{name:"Mango Bird",file:"Picsart_26-02-27_01-28-33-302.png",unlockScore:10},
{name:"Happy Perrot",file:"Picsart_26-02-27_10-16-34-761.png",unlockScore:20}
];

skins.forEach(s=>{
if(s.unlockScore===0) skinData[s.name]={unlocked:true};
else if(!skinData[s.name]) skinData[s.name]={unlocked:false};
});

let selectedSkinName=localStorage.getItem("selectedSkin")||"Bird";
let selectedSkin=skins.find(s=>s.name===selectedSkinName);

let loadedImages={};
skins.forEach(s=>{
let img=new Image();
img.src=s.file;
loadedImages[s.name]=img;
});

function initGame(){
bird={x:100,y:200,width:60,height:60,velocity:0};
gravity=0.35;
pipes=[];
score=0;
gameOver=false;
}

function createPipe(){
let gap=220;
let topHeight=Math.random()*(canvas.height-gap-100)+50;
pipes.push({x:canvas.width,width:60,top:topHeight,bottom:canvas.height-topHeight-gap,passed:false});
}

function startGame(){
titleScreen.style.display="none";
storeScreen.style.display="none";
restartBtn.style.display="none";
homeBtn.style.display="none";
initGame();
pipeInterval=setInterval(createPipe,2000);
update();
}

function endGame(){
gameOver=true;
clearInterval(pipeInterval);
restartBtn.style.display="block";
homeBtn.style.display="block";

if(score>highScore){
highScore=score;
localStorage.setItem("fluppyHighScore",highScore);
}

// 🔥 INSTANT UNLOCK FIX
let unlocked=false;
skins.forEach(s=>{
if(score>=s.unlockScore && !skinData[s.name].unlocked){
skinData[s.name].unlocked=true;
unlocked=true;
}
});
if(unlocked){
localStorage.setItem("fluppySkins",JSON.stringify(skinData));
}
}

function update(){
if(gameOver) return;
bird.velocity+=gravity;
bird.y+=bird.velocity;

ctx.clearRect(0,0,canvas.width,canvas.height);

let img=loadedImages[selectedSkin.name];
if(img.complete){
ctx.drawImage(img,bird.x,bird.y,bird.width,bird.height);
}

pipes.forEach(pipe=>{
pipe.x-=3;
ctx.fillStyle="green";
ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
ctx.fillRect(pipe.x,canvas.height-pipe.bottom,pipe.width,pipe.bottom);

if(bird.x<pipe.x+pipe.width &&
bird.x+bird.width>pipe.x &&
(bird.y<pipe.top || bird.y+bird.height>canvas.height-pipe.bottom)){
endGame();
}

if(!pipe.passed && pipe.x+pipe.width<bird.x){
score++;
pipe.passed=true;
}
});

if(bird.y+bird.height>canvas.height||bird.y<0) endGame();

ctx.fillStyle="black";
ctx.font="25px Arial";
ctx.fillText("Score: "+score,20,40);

requestAnimationFrame(update);
}

// 🔥 JUMP POWER REDUCED
document.addEventListener("click",()=>{
if(!gameOver){
bird.velocity=-4.8;
}
});

playBtn.onclick=startGame;
restartBtn.onclick=startGame;
homeBtn.onclick=()=>{ titleScreen.style.display="flex"; restartBtn.style.display="none"; homeBtn.style.display="none"; };

storeBtn.onclick=()=>{
titleScreen.style.display="none";
storeScreen.style.display="flex";
renderSkins();
};

function backHome(){
storeScreen.style.display="none";
titleScreen.style.display="flex";
}

function renderSkins(){
skinRow.innerHTML="";
upperSkinDisplay.innerHTML="";
let upperImg=loadedImages[selectedSkin.name].cloneNode();
upperImg.style.width="150px";
upperImg.style.height="150px";
upperSkinDisplay.appendChild(upperImg);

skins.forEach(s=>{
let box=document.createElement("div");
box.className="skinBox";
let img=loadedImages[s.name].cloneNode();
box.appendChild(img);

let name=document.createElement("div");
name.textContent=s.name;
box.appendChild(name);

let price=document.createElement("div");
price.textContent=s.unlockScore+" score";
box.appendChild(price);

let overlay=document.createElement("div");
overlay.className="lockOverlay";
if(skinData[s.name].unlocked){ overlay.style.display="none"; }
else{ overlay.textContent="🔒"; }
box.appendChild(overlay);

box.onclick=()=>{
if(skinData[s.name].unlocked){
selectedSkin=s;
confirmSkinBtn.className="confirmBtn unlocked";
}else{
confirmSkinBtn.className="confirmBtn locked";
}
renderSkins();
};

skinRow.appendChild(box);
});

if(skinData[selectedSkin.name].unlocked)
confirmSkinBtn.className="confirmBtn unlocked";
else
confirmSkinBtn.className="confirmBtn locked";
}

confirmSkinBtn.onclick=()=>{
if(confirmSkinBtn.classList.contains("unlocked")){
localStorage.setItem("selectedSkin",selectedSkin.name);
storeScreen.style.display="none";
titleScreen.style.display="flex";
}
};
</script>
</body>
</html>
