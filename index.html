<!DOCTYPE html>
<html>
<head>
<title>Fluppy Bird with Store + Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0; overflow:hidden; font-family:Arial;}
canvas{display:block;}

/* Login overlay */
#loginOverlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;font-size:24px;z-index:10000;}
#loginOverlay input{font-size:20px;padding:8px;margin-bottom:15px;}
#loginOverlay button{font-size:20px;padding:8px 20px;cursor:pointer;}

/* Screens */
#titleScreen,#settingsScreen,#storeScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;}
#titleScreen{background:skyblue; display:flex; flex-direction:column;}
#titleScreen button,#settingsScreen button,#storeScreen button{padding:12px 30px; font-size:20px;margin:8px;cursor:pointer;}
#settingsScreen{background:#f0f0f0;}
#storeScreen{background:#d0f0f0; flex-direction:column;}
.skinRow{display:flex;justify-content:center;margin:15px 0;}
.skinBox{width:120px;margin:0 10px;text-align:center;cursor:pointer;position:relative;}
.skinBox img{width:100px;height:100px;border-radius:10px;}
.lockOverlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-size:30px;}
.confirmBtn{padding:6px 20px;font-size:16px;border:none;border-radius:6px;cursor:pointer;margin-top:5px;font-weight:bold;}
.confirmBtn.locked{background:grey;color:white;cursor:not-allowed;}
.confirmBtn.unlocked{background:green;color:white;}

/* Game buttons */
#pauseBtn,#restartBtn,#homeBtn{position:absolute;top:10px;padding:8px 12px;font-size:16px;cursor:pointer;display:none;}
#pauseBtn{right:10px;}
#restartBtn{top:50%;left:50%;transform:translate(-50%,-50%);}
#homeBtn{top:50%;left:50%;transform:translate(-50%,70%);}

/* Made by */
#madeBy{position:absolute;bottom:10px;left:10px;font-size:14px;}
</style>
</head>
<body>

<!-- Login -->
<div id="loginOverlay">
  <input id="usernameInput" placeholder="Enter Username">
  <button id="loginBtn">Login</button>
</div>

<!-- Starting Screen -->
<div id="titleScreen">
  <h1>Fluppy Bird</h1>
  <button id="playBtn">Play</button>
  <button id="storeBtn">Store</button>
</div>

<!-- Store Screen -->
<div id="storeScreen">
  <button id="backStoreBtn">&#8592;</button>
  <h2>Choose Skin</h2>
  <div id="upperSkinDisplay" style="text-align:center;margin:10px;"></div>
  <div class="skinRow" id="skinRow"></div>
  <button id="confirmSkinBtn" class="confirmBtn locked">Confirm</button>
</div>

<canvas id="gameCanvas"></canvas>
<button id="pauseBtn">Pause</button>
<button id="restartBtn">Restart</button>
<button id="homeBtn">Home</button>
<div id="madeBy">Made by TrollHunter</div>

<script>
const loginOverlay = document.getElementById("loginOverlay");
const usernameInput = document.getElementById("usernameInput");
const loginBtn = document.getElementById("loginBtn");

const titleScreen = document.getElementById("titleScreen");
const playBtn = document.getElementById("playBtn");
const storeBtn = document.getElementById("storeBtn");
const storeScreen = document.getElementById("storeScreen");
const backStoreBtn = document.getElementById("backStoreBtn");
const confirmSkinBtn = document.getElementById("confirmSkinBtn");
const upperSkinDisplay = document.getElementById("upperSkinDisplay");
const skinRow = document.getElementById("skinRow");

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const pauseBtn = document.getElementById("pauseBtn");
const restartBtn = document.getElementById("restartBtn");
const homeBtn = document.getElementById("homeBtn");

// --- User Login ---
let username = localStorage.getItem("fluppyUsername") || "";
if(username){
    loginOverlay.style.display="none";
    titleScreen.style.display="flex";
}
loginBtn.addEventListener("click", ()=>{
    const val = usernameInput.value.trim();
    if(val){
        username=val;
        localStorage.setItem("fluppyUsername",username);
        loginOverlay.style.display="none";
        titleScreen.style.display="flex";
    }else{ alert("Enter username"); }
});

// --- Skins ---
let defaultSkin = {name:"Bird", file:"Picsart_26-02-26_17-30-25-252.png", price:0};
let skins = [
  {name:"Mango Bird", file:"Picsart_26-02-27_01-28-33-302.png", price:10},
  {name:"Happy Perrot", file:"Picsart_26-02-27_10-16-34-761.png", price:20},
  {name:"Angry Bird", file:"Picsart_26-02-27_10-15-45-688.png", price:30}
];
let selectedSkin = defaultSkin;

// --- Load unlocked skins from localStorage ---
let unlockedSkins = JSON.parse(localStorage.getItem("fluppyUnlockedSkins")) || [defaultSkin.name];

// --- Game vars ---
let bird, gravity, pipes, score, highScore, gameOver, gameStarted, pipeSpeed;
highScore = Number(localStorage.getItem("fluppyHighScore") || 0);

// --- Game functions ---
function initGame(){
    bird={x:100,y:200,width:60,height:60,velocity:0};
    gravity=0.35;
    pipes=[];
    score=0;
    gameOver=false;
    gameStarted=false;
    pipeSpeed=2;
}

// --- Countdown ---
function startGame(){
    titleScreen.style.display="none";
    initGame();
    let countdown = ["3","2","1","Go!"];
    let idx=0;
    const overlay = document.createElement("div");
    overlay.style.position="absolute"; overlay.style.top=0; overlay.style.left=0;
    overlay.style.width="100%"; overlay.style.height="100%";
    overlay.style.display="flex"; overlay.style.alignItems="center"; overlay.style.justifyContent="center";
    overlay.style.fontSize="120px"; overlay.style.color="white"; overlay.style.background="rgba(0,0,0,0.3)";
    document.body.appendChild(overlay);
    const interval = setInterval(()=>{
        overlay.textContent=countdown[idx];
        idx++;
        if(idx>=countdown.length){
            clearInterval(interval);
            document.body.removeChild(overlay);
            gameStarted=true;
            update();
        }
    },1000);
}

// --- Update ---
function update(){
    if(!gameStarted) return;
    bird.velocity+=gravity;
    bird.y+=bird.velocity;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Draw bird
    const img = new Image();
    img.src = selectedSkin.file;
    ctx.drawImage(img,bird.x,bird.y,bird.width,bird.height);

    requestAnimationFrame(update);
}

// --- Jump ---
document.addEventListener("click", ()=>{
    if(gameStarted) bird.velocity=-6;
});

// --- Event Listeners ---
playBtn.addEventListener("click", startGame);
storeBtn.addEventListener("click", renderSkins);
backStoreBtn.addEventListener("click", ()=>{
    storeScreen.style.display="none";
    titleScreen.style.display="flex";
});
confirmSkinBtn.addEventListener("click", ()=>{
    if(unlockedSkins.includes(selectedSkin.name)){
        storeScreen.style.display="none";
        titleScreen.style.display="flex";
        localStorage.setItem("fluppyUnlockedSkins", JSON.stringify(unlockedSkins));
    }
});

// --- Render Skins ---
function renderSkins(){
    storeScreen.style.display="flex";
    skinRow.innerHTML="";
    upperSkinDisplay.innerHTML="";
    const upImg = new Image();
    upImg.src = selectedSkin.file;
    upImg.style.width="150px"; upImg.style.height="150px";
    upperSkinDisplay.appendChild(upImg);

    skins.forEach(s=>{
        const box = document.createElement("div");
        box.className="skinBox";
        const img = document.createElement("img");
        img.src=s.file;
        box.appendChild(img);
        const nameDiv=document.createElement("div");
        nameDiv.textContent=`${s.name} - ${s.price} score`;
        box.appendChild(nameDiv);
        const overlay = document.createElement("div");
        overlay.className="lockOverlay";
        if(unlockedSkins.includes(s.name)){ overlay.style.display="none"; }
        else{ overlay.textContent="🔒"; }
        box.appendChild(overlay);

        box.addEventListener("click", ()=>{
            selectedSkin = s;
            if(unlockedSkins.includes(s.name)){
                confirmSkinBtn.className="confirmBtn unlocked";
            } else {
                confirmSkinBtn.className="confirmBtn locked";
            }
            renderSkins();
        });

        skinRow.appendChild(box);
    });

    if(unlockedSkins.includes(selectedSkin.name)){ confirmSkinBtn.className="confirmBtn unlocked"; }
    else{ confirmSkinBtn.className="confirmBtn locked"; }
}

</script>
</body>
</html>
