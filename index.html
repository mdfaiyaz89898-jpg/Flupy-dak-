<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluppy Bird</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#78b7d0;
    text-align:center;
    overflow:hidden;
}

canvas{
    display:none;
    background:#78b7d0;
}

/* Title */
.title{
    font-size:48px;
    margin-top:80px;
    color:yellow;
    text-shadow:4px 4px orange, 6px 6px black;
}

/* 3D Buttons */
.btn{
    display:block;
    width:200px;
    margin:20px auto;
    padding:15px;
    font-size:20px;
    border-radius:15px;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.playBtn{ background:gold; box-shadow:0 6px #c9a500; }
.settingsBtn{ background:orange; box-shadow:0 6px #c96b00; color:white;}
.storeBtn{ background:#2196f3; box-shadow:0 6px #1565c0; color:white;}
.restartBtn{ background:#ff3d00; box-shadow:0 6px #b22a00; color:white;}
.homeBtn{ background:#2196f3; box-shadow:0 6px #1565c0; color:white;}

.btn:active{ transform:translateY(4px); box-shadow:0 2px #000; }

/* Panels */
.panel{
    display:none;
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:#78b7d0;
}

.back{
    position:absolute;
    top:20px;
    left:20px;
    font-size:25px;
    background:none;
    border:none;
    cursor:pointer;
}

.skinGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    padding:20px;
}

.skinBox{
    background:#a6cbd6;
    padding:15px;
    border-radius:15px;
}

.skinBox img{
    width:80px;
}

.lock{
    font-size:20px;
    color:red;
}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
<div class="title">Fluppy Bird</div>
<button class="btn playBtn" onclick="startGame()">Play</button>
<button class="btn settingsBtn" onclick="openSettings()">Settings</button>
<button class="btn storeBtn" onclick="openStore()">Store</button>
<p>Made by TrollHunter</p>
</div>

<!-- SETTINGS -->
<div id="settings" class="panel">
<button class="back" onclick="closePanels()">⬅</button>
<h2>Select Difficulty</h2>
<label><input type="radio" name="diff" value="easy"> Very Easy</label><br><br>
<label><input type="radio" name="diff" value="normal"> Normal</label><br><br>
<label><input type="radio" name="diff" value="hard"> Hard</label>
</div>

<!-- STORE -->
<div id="store" class="panel">
<button class="back" onclick="closePanels()">⬅</button>
<h2>Choose Skin</h2>
<div id="selectedPreview"></div>
<div class="skinGrid" id="skinGrid"></div>
</div>

<!-- GAME -->
<canvas id="game"></canvas>

<!-- GAME OVER -->
<div id="gameOver" class="panel">
<button class="btn restartBtn" onclick="restartGame()">Restart</button>
<button class="btn homeBtn" onclick="goHome()">Home</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gravity=0.4, velocity=0, birdY, pipes=[], score=0;
let pipeGap=280, pipeSpeed=2;
let gameRunning=false;

let difficulty=localStorage.getItem("difficulty")||"easy";
applyDifficulty(difficulty);
document.querySelectorAll("input[name=diff]").forEach(r=>{
if(r.value===difficulty) r.checked=true;
r.onchange=()=>applyDifficulty(r.value);
});

function applyDifficulty(level){
difficulty=level;
localStorage.setItem("difficulty",level);
if(level==="easy"){pipeGap=280;pipeSpeed=2;}
if(level==="normal"){pipeGap=200;pipeSpeed=3;}
if(level==="hard"){pipeGap=150;pipeSpeed=5;}
}

/* SKINS */
const skins=[
{name:"Bird", file:"Picsart_26-02-26_17-30-25-252.png", unlockScore:0},
{name:"Mango Bird", file:"Picsart_26-02-27_01-28-33-302.png", unlockScore:10},
{name:"Happy Perrot", file:"Picsart_26-02-27_10-16-34-761.png", unlockScore:20},
{name:"Angry Bird", file:"Picsart_26-02-27_10-15-45-688.png", unlockScore:30}
];

let skinData=JSON.parse(localStorage.getItem("skins"))||{};
skins.forEach(s=>{
if(!skinData[s.name])
skinData[s.name]={unlocked:s.unlockScore===0,selected:s.unlockScore===0};
});
localStorage.setItem("skins",JSON.stringify(skinData));

let selectedSkin=skins.find(s=>skinData[s.name].selected);
let birdImg=new Image();
birdImg.src=selectedSkin.file;

/* GAME FUNCTIONS */

function startGame(){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
birdY=canvas.height/2;
velocity=0;
pipes=[];
score=0;
gameRunning=true;
loop();
}

function loop(){
if(!gameRunning) return;
ctx.clearRect(0,0,canvas.width,canvas.height);

velocity+=gravity;
birdY+=velocity;

/* Tilt */
ctx.save();
ctx.translate(100,birdY);
ctx.rotate(velocity*0.05);
ctx.drawImage(birdImg,-20,-20,40,40);
ctx.restore();

/* Pipes */
if(Math.random()<0.02){
let top=Math.random()*(canvas.height-300);
pipes.push({x:canvas.width,top:top});
}

pipes.forEach(p=>{
p.x-=pipeSpeed;
ctx.fillStyle="green";
ctx.fillRect(p.x,0,60,p.top);
ctx.fillRect(p.x,p.top+pipeGap,60,canvas.height);
if(p.x===100) score++;
if((birdY-20<p.top||birdY+20>p.top+pipeGap)&&p.x<140&&p.x>60){
endGame();
}
});

ctx.fillStyle="black";
ctx.fillText("Score: "+score,20,40);

if(birdY>canvas.height) endGame();

requestAnimationFrame(loop);
}

function endGame(){
gameRunning=false;
canvas.style.display="none";
document.getElementById("gameOver").style.display="block";

skins.forEach(s=>{
if(score>=s.unlockScore)
skinData[s.name].unlocked=true;
});
localStorage.setItem("skins",JSON.stringify(skinData));
}

function restartGame(){
document.getElementById("gameOver").style.display="none";
startGame();
}

function goHome(){
location.reload();
}

/* Tap Jump */
canvas.addEventListener("click",()=>velocity=-5);

/* PANELS */

function openSettings(){
document.getElementById("menu").style.display="none";
document.getElementById("settings").style.display="block";
}

function openStore(){
document.getElementById("menu").style.display="none";
document.getElementById("store").style.display="block";
renderStore();
}

function closePanels(){
document.querySelectorAll(".panel").forEach(p=>p.style.display="none");
document.getElementById("menu").style.display="block";
}

/* STORE RENDER */

function renderStore(){
let preview=document.getElementById("selectedPreview");
preview.innerHTML="<img src='"+selectedSkin.file+"' width='120'>";

let grid=document.getElementById("skinGrid");
grid.innerHTML="";

skins.forEach(s=>{
let box=document.createElement("div");
box.className="skinBox";

let img=document.createElement("img");
img.src=s.file;

let text=document.createElement("div");

if(skinData[s.name].unlocked){
text.innerHTML="Select";
box.onclick=()=>{
Object.keys(skinData).forEach(k=>skinData[k].selected=false);
skinData[s.name].selected=true;
localStorage.setItem("skins",JSON.stringify(skinData));
location.reload();
};
}else{
text.innerHTML="🔒 "+s.unlockScore+" score";
}

box.appendChild(img);
box.appendChild(text);
grid.appendChild(box);
});
}
</script>
</body>
  </html>
