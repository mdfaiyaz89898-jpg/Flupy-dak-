<!DOCTYPE html>
<html>
<head>
<title>Fluppy Bird</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;overflow:hidden;font-family:Arial;background:skyblue;}
canvas{display:block;}

#titleScreen,#storeScreen{
position:absolute;width:100%;height:100%;
top:0;left:0;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
}

#titleScreen h1{
font-size:60px;color:yellow;
text-shadow:4px 4px 0 black,8px 8px 0 orange;
margin-bottom:30px;
}

button{
padding:12px 30px;font-size:20px;
border:none;border-radius:12px;
margin:8px;cursor:pointer;
}

#pauseBtn,#restartBtn,#homeBtn{
position:absolute;top:10px;
padding:8px 12px;border:none;
border-radius:8px;font-size:16px;
cursor:pointer;font-weight:bold;
}

#pauseBtn{right:10px;display:none;background:#ccc;}
#restartBtn{display:none;top:50%;left:50%;transform:translate(-50%,-50%);}
#homeBtn{display:none;top:60%;left:50%;transform:translate(-50%,-50%);}
</style>
</head>
<body>

<div id="titleScreen">
<h1>Fluppy Bird</h1>
<button id="playBtn">Play</button>
<button id="storeBtn">Store</button>
</div>

<div id="storeScreen" style="display:none;">
<button id="backStoreBtn">Back</button>
<h2>Skins</h2>
</div>

<canvas id="gameCanvas"></canvas>
<button id="pauseBtn">⏸</button>
<button id="restartBtn">Restart</button>
<button id="homeBtn">Home</button>

<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const playBtn=document.getElementById('playBtn');
const storeBtn=document.getElementById('storeBtn');
const backStoreBtn=document.getElementById('backStoreBtn');
const pauseBtn=document.getElementById('pauseBtn');
const restartBtn=document.getElementById('restartBtn');
const homeBtn=document.getElementById('homeBtn');

// Game Variables
let bird,gravity,pipes=[],score=0,gameOver=false,paused=false,gameStarted=false;

let baseSpeed=1.5;
let pipeSpeed=baseSpeed;
let speedIncrement=0.1;
let maxSpeed=8;

let highScore=parseInt(localStorage.getItem('fluppyHighScore'))||0;

// Stars
let stars=[];
for(let i=0;i<50;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*(canvas.height/2)});
}

// Simple Skin
let selectedSkin={pipeColor:"#00c853",groundColor:"#8B4513"};

// INIT
function initGame(){
bird={x:100,y:200,width:60,height:60,velocity:0,rotation:0};
gravity=0.35;
pipes=[];
score=0;
gameOver=false;
paused=false;
pipeSpeed=baseSpeed;
}

// PIPE
function createPipe(){
let gap=250;
const topHeight=Math.random()*(canvas.height-gap-100)+50;
pipes.push({
x:canvas.width,
width:70,
top:topHeight,
bottom:canvas.height-topHeight-gap,
passed:false
});
}

// START
function startGame(){
document.getElementById('titleScreen').style.display='none';
pauseBtn.style.display='block';
restartBtn.style.display='none';
homeBtn.style.display='none';

initGame();
gameStarted=true;
update();
}

// UPDATE
function update(){
if(!gameStarted||gameOver||paused)return;

bird.velocity+=gravity;
bird.y+=bird.velocity;
bird.rotation=Math.min(bird.velocity*5,25);

ctx.clearRect(0,0,canvas.width,canvas.height);

// Day/Night
if(Math.floor(score/5)%2===0){
ctx.fillStyle="skyblue";
}else{
ctx.fillStyle="#1a1a2e";
ctx.fillStyle="#1a1a2e";
}
ctx.fillRect(0,0,canvas.width,canvas.height);

if(pipes.length===0||pipes[pipes.length-1].x<canvas.width-300){
createPipe();
}

pipes.forEach(pipe=>{
pipe.x-=pipeSpeed;

ctx.fillStyle=selectedSkin.pipeColor;
ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
ctx.fillRect(pipe.x,canvas.height-pipe.bottom,pipe.width,pipe.bottom);

if(bird.x<pipe.x+pipe.width && bird.x+bird.width>pipe.x &&
(bird.y<pipe.top || bird.y+bird.height>canvas.height-pipe.bottom)){
endGame();
}

if(!pipe.passed && pipe.x+pipe.width<bird.x){
score++;
pipe.passed=true;
if(pipeSpeed<maxSpeed){
pipeSpeed+=speedIncrement;
}
}
});

// Ground
ctx.fillStyle=selectedSkin.groundColor;
ctx.fillRect(0,canvas.height-50,canvas.width,50);

// Bird
ctx.fillStyle="yellow";
ctx.fillRect(bird.x,bird.y,bird.width,bird.height);

// Score
ctx.fillStyle="black";
ctx.font="25px Arial";
ctx.fillText("Score: "+score,20,40);
ctx.fillText("High Score: "+highScore,20,70);

requestAnimationFrame(update);
}

// END
function endGame(){
gameOver=true;
restartBtn.style.display='block';
homeBtn.style.display='block';
pauseBtn.style.display='none';

if(score>highScore){
highScore=score;
localStorage.setItem('fluppyHighScore',highScore);
}
}

function jump(){
if(gameStarted&&!gameOver)bird.velocity=-5;
}

document.addEventListener('click',jump);
playBtn.addEventListener('click',startGame);
restartBtn.addEventListener('click',startGame);

homeBtn.addEventListener('click',()=>{
document.getElementById('titleScreen').style.display='flex';
restartBtn.style.display='none';
homeBtn.style.display='none';
pauseBtn.style.display='none';
});

storeBtn.addEventListener('click',()=>{
document.getElementById('titleScreen').style.display='none';
document.getElementById('storeScreen').style.display='flex';
});

backStoreBtn.addEventListener('click',()=>{
document.getElementById('storeScreen').style.display='none';
document.getElementById('titleScreen').style.display='flex';
});
</script>
</body>
</html>
