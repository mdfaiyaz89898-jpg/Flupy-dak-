<!DOCTYPE html>
<html>
<head>
<title>Fluppy Bird Full Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;overflow:hidden;font-family:Arial;background:skyblue;}
canvas{display:block;}

/* Screens */
#loginScreen,#titleScreen,#settingsScreen,#storeScreen,#leaderboardScreen{
  position:absolute;width:100%;height:100%;top:0;left:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#loginScreen{background:#87ceeb;}
#loginScreen input{padding:12px;font-size:18px;margin-bottom:20px;border-radius:8px;border:1px solid #333;}
#loginScreen button{padding:10px 20px;font-size:18px;cursor:pointer;border-radius:8px;}

/* Title Screen */
#titleScreen h1{
  font-size:60px;color:yellow;text-shadow:4px 4px 0 black,8px 8px 0 orange;font-family:'Comic Sans MS',cursive;animation:bounce 1s infinite alternate;margin-bottom:30px;
}
@keyframes bounce{0%{transform:translateY(0px);}100%{transform:translateY(-10px);}}
#titleScreen button{padding:12px 30px;font-size:20px;border:none;border-radius:12px;margin:8px;cursor:pointer;transition:0.2s;}
#titleScreen button:hover{transform:scale(1.1);}
#playBtn{background:linear-gradient(45deg,#ffeb3b,#fbc02d);color:#000;font-weight:bold;}
#settingsBtnMain{background:linear-gradient(45deg,#ff9800,#f57c00);color:white;font-weight:bold;}
#storeBtn{background:linear-gradient(45deg,#4fc3f7,#0288d1);color:white;font-weight:bold;}
#leaderboardBtn{background:linear-gradient(45deg,#f50057,#c51162);color:white;font-weight:bold;}

/* Settings */
#settingsScreen{background:#f0f0f0;display:none;flex-direction:column;justify-content:flex-start;padding-top:60px;}
#settingsScreen h2{margin-bottom:20px;}
#settingsScreen .backBtn{position:absolute;top:10px;left:10px;font-size:25px;background:transparent;color:orange;border:none;cursor:pointer;}

/* Store */
#storeScreen{background:#d0f0f0;display:none;flex-direction:column;justify-content:flex-start;padding-top:40px;}
#storeScreen h2{font-size:32px;margin-bottom:20px;color:#333;}
#storeScreen .backStoreBtn{position:absolute;top:10px;left:10px;font-size:30px;background:transparent;color:orange;border:none;cursor:pointer;}
.skinRow{display:flex;justify-content:center;margin:15px 0;flex-wrap:wrap;}
.skinBox{width:120px;margin:0 10px;text-align:center;cursor:pointer;border-radius:10px;padding:6px;position:relative;}
.skinBox img{width:100px;height:100px;border-radius:10px;}
.lockOverlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-size:30px;}
.confirmBtn{padding:6px 20px;font-size:16px;border:none;border-radius:6px;cursor:pointer;margin-top:5px;font-weight:bold;}
.confirmBtn.locked{background:grey;color:white;cursor:not-allowed;}
.confirmBtn.unlocked{background:green;color:white;}

/* Leaderboard */
#leaderboardScreen{background:#fff;display:none;flex-direction:column;justify-content:flex-start;padding-top:40px;width:100%;height:100%;overflow:auto;}
#leaderboardScreen h2{font-size:32px;margin-bottom:20px;color:#333;}
#leaderboardList{width:80%;max-width:400px;text-align:left;}
#leaderboardList div{padding:10px;border-bottom:1px solid #ccc;font-size:18px;}
#leaderboardScreen .backBtn{position:absolute;top:10px;left:10px;font-size:25px;background:transparent;color:orange;border:none;cursor:pointer;}

/* In-Game */
#pauseBtn,#restartBtn,#homeBtn{position:absolute;top:10px;padding:8px 12px;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold;}
#pauseBtn{right:10px;display:none;background:#ccc;color:#333;}
#pauseBtn::after{content:"⏸";font-size:18px;}
#restartBtn{display:none;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(45deg,#ff5722,#e64a19);color:white;box-shadow:3px 3px 0 #b71c1c;}
#homeBtn{display:none;top:50%;left:50%;transform:translate(-50%,70%);background:linear-gradient(45deg,#03a9f4,#0288d1);color:white;box-shadow:3px 3px 0 #01579b;}

/* Made by */
#madeBy{position:absolute;bottom:10px;left:10px;font-size:14px;}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <h2>Enter Username</h2>
  <input type="text" id="playerName" placeholder="Username">
  <button id="loginBtn">Login</button>
</div>

<!-- Title Screen -->
<div id="titleScreen">
  <h1>Fluppy Bird</h1>
  <button id="playBtn">Play</button>
  <button id="settingsBtnMain">Settings</button>
  <button id="storeBtn">Store</button>
  <button id="leaderboardBtn">Leaderboard</button>
</div>

<!-- Settings -->
<div id="settingsScreen">
  <button class="backBtn">&#8592;</button>
  <h2>Select Difficulty</h2>
  <div id="difficultyOptions">
    <label><input type="radio" name="difficulty" value="Very Easy"> Very Easy</label>
    <label><input type="radio" name="difficulty" value="Normal"> Normal</label>
    <label><input type="radio" name="difficulty" value="Hard"> Hard</label>
  </div>
</div>

<!-- Store -->
<div id="storeScreen">
  <button class="backStoreBtn">&#8592;</button>
  <h2>Choose Skin</h2>
  <div id="upperSkinDisplay" style="text-align:center;margin:10px;"></div>
  <div class="skinRow" id="skinRow"></div>
  <button id="confirmSkinBtn" class="confirmBtn locked">Confirm</button>
</div>

<!-- Leaderboard -->
<div id="leaderboardScreen">
  <button class="backBtn">&#8592; Back</button>
  <h2>Leaderboard</h2>
  <div id="leaderboardList"></div>
</div>

<canvas id="gameCanvas"></canvas>
<button id="pauseBtn"></button>
<button id="restartBtn">Restart</button>
<button id="homeBtn">Home</button>
<div id="madeBy">Made by TrollHunter</div>

<script>
// ----------------- Variables -----------------
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// Screens
const loginScreen=document.getElementById("loginScreen");
const titleScreen=document.getElementById("titleScreen");
const settingsScreen=document.getElementById("settingsScreen");
const storeScreen=document.getElementById("storeScreen");
const leaderboardScreen=document.getElementById("leaderboardScreen");

// Buttons
const playBtn=document.getElementById("playBtn");
const settingsBtnMain=document.getElementById("settingsBtnMain");
const storeBtn=document.getElementById("storeBtn");
const leaderboardBtn=document.getElementById("leaderboardBtn");
const backBtns=document.querySelectorAll('.backBtn');
const backStoreBtn=document.querySelector(".backStoreBtn");
const pauseBtn=document.getElementById("pauseBtn");
const restartBtn=document.getElementById("restartBtn");
const homeBtn=document.getElementById("homeBtn");
const confirmSkinBtn=document.getElementById("confirmSkinBtn");
const upperSkinDisplay=document.getElementById("upperSkinDisplay");
const skinRow=document.getElementById("skinRow");

// Login
const playerNameInput=document.getElementById("playerName");
const loginBtn=document.getElementById("loginBtn");
let currentPlayer=localStorage.getItem("fluppyPlayer")||"";

// Game
let bird,gravity,pipes,score,highScore,gameOver,gameStarted,paused,pipeSpeed,difficulty;
highScore=localStorage.getItem("fluppyHighScore")||0;
difficulty=localStorage.getItem("fluppyDifficulty")||"Very Easy";
pipeSpeed=2;
const difficultySpeeds={ "Very Easy":2,"Normal":4,"Hard":6 };

// Skins
let skins=[
  {name:"Bird", file:"Picsart_26-02-26_17-30-25-252.png", unlockScore:0},
  {name:"Mango Bird", file:"Picsart_26-02-27_01-28-33-302.png", unlockScore:10},
  {name:"Happy Perrot", file:"Picsart_26-02-27_10-16-34-761.png", unlockScore:20},
  {name:"Angry Bird", file:"Picsart_26-02-27_10-15-45-688.png", unlockScore:30}
];
let skinData=JSON.parse(localStorage.getItem("fluppySkins"))||{};
skins.forEach(s=>{if(s.unlockScore===0) skinData[s.name]={unlocked:true}; else if(!skinData[s.name]) skinData[s.name]={unlocked:false};});
let selectedSkinName=localStorage.getItem("selectedSkin")||"Bird";
let selectedSkin=skins.find(s=>s.name===selectedSkinName);

// ----------------- Functions -----------------
function initGame(){
  bird={x:100,y:200,width:60,height:60,velocity:0,rotation:0};
  gravity=0.35; pipes=[]; score=0; gameOver=false; paused=false;
  pipeSpeed=difficultySpeeds[difficulty];
  document.querySelector(`input[name="difficulty"][value="${difficulty}"]`).checked=true;
}
function createPipe(){
  const gap=220;
  const topHeight=Math.random()*(canvas.height-gap-100)+50;
  pipes.push({x:canvas.width,width:60,top:topHeight,bottom:canvas.height-topHeight-gap,passed:false});
}
let pipeInterval;
function startGame(){
  titleScreen.style.display="none"; settingsScreen.style.display="none"; storeScreen.style.display="none";
  pauseBtn.style.display="none"; restartBtn.style.display="none"; homeBtn.style.display="none";
  gameStarted=false; initGame();
  let countdown=["3","2","1","Go!"],countIndex=0;
  const overlay=document.createElement("div");
  overlay.style.cssText="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:120px;color:white;text-shadow:4px 4px 0 black;background:rgba(0,0,0,0.3);z-index:1000;";
  document.body.appendChild(overlay);
  const interval=setInterval(()=>{
    overlay.textContent=countdown[countIndex];countIndex++;
    if(countIndex>=countdown.length){clearInterval(interval);document.body.removeChild(overlay);pauseBtn.style.display="block";gameStarted=true;pipeInterval=setInterval(createPipe,2000);update();}
  },1000);
}
function endGame(){
  gameOver=true; clearInterval(pipeInterval); restartBtn.style.display="block"; homeBtn.style.display="block"; pauseBtn.style.display="none";
  if(score>highScore){highScore=score;localStorage.setItem("fluppyHighScore",highScore);}
  if(currentPlayer){let lb=JSON.parse(localStorage.getItem("fluppyLeaderboard"))||[];lb.push({name:currentPlayer,score:score}); lb.sort((a,b)=>b.score-a.score); localStorage.setItem("fluppyLeaderboard",JSON.stringify(lb));}
}
function update(){
  if(!gameStarted||gameOver||paused) return;
  bird.velocity+=gravity; bird.y+=bird.velocity; bird.rotation=Math.min(bird.velocity*5,25);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // background animation
  const cycle=Math.floor(score/5)%2;
  if(cycle===0){canvas.style.background="skyblue"; ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(200,100,30,0,Math.PI*2); ctx.arc(240,100,30,0,Math.PI*2); ctx.arc(220,80,30,0,Math.PI*2); ctx.fill();}
  else{canvas.style.background="#1a1a2e"; ctx.fillStyle="white"; for(let i=0;i<50;i++){ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);}}

  // bird
  const birdImg=new Image(); birdImg.src=selectedSkin.file;
  ctx.save(); ctx.translate(bird.x+bird.width/2,bird.y+bird.height/2); ctx.rotate(bird.rotation*Math.PI/180); ctx.drawImage(birdImg,-bird.width/2,-bird.height/2,bird.width,bird.height); ctx.restore();

  // pipes
  pipes.forEach(pipe=>{pipe.x-=pipeSpeed; ctx.fillStyle="#00c853"; ctx.fillRect(pipe.x,0,pipe.width,pipe.top); ctx.fillRect(pipe.x,canvas.height-pipe.bottom,pipe.width,pipe.bottom);
  if(bird.x<pipe.x+pipe.width && bird.x+bird.width>pipe.x && (bird.y<pipe.top || bird.y+bird.height>canvas.height-pipe.bottom)) endGame();
  if(!pipe.passed && pipe.x+pipe.width<bird.x){score++; pipe.passed=true;}});
  if(bird.y+bird.height>canvas.height || bird.y<0) endGame();

  ctx.fillStyle="black"; ctx.font="25px Arial";
  ctx.fillText("Score: "+score,20,40);
  ctx.fillText("High Score: "+highScore,20,70);

  requestAnimationFrame(update);
}
function jump(){if(gameStarted&&!gameOver) bird.velocity=-6;}
document.addEventListener("click",jump);
document.addEventListener("touchstart",e=>{e.preventDefault();jump();});

// ----------------- Buttons -----------------
loginBtn.addEventListener("click",()=>{
  const name=playerNameInput.value.trim();
  if(name){currentPlayer=name; localStorage.setItem("fluppyPlayer",name); loginScreen.style.display="none"; titleScreen.style.display="flex";}
  else alert("Enter a valid name");
});
if(currentPlayer) loginScreen.style.display="none"; else loginScreen.style.display="flex";

playBtn.addEventListener("click",()=>{startGame();});
settingsBtnMain.addEventListener("click",()=>{titleScreen.style.display="none"; settingsScreen.style.display="flex";});
backBtns.forEach(b=>b.addEventListener("click",()=>{settingsScreen.style.display="none"; leaderboardScreen.style.display="none"; titleScreen.style.display="flex";}));
storeBtn.addEventListener("click",()=>{storeScreen.style.display="flex"; renderSkins(); titleScreen.style.display="none";});
backStoreBtn.addEventListener("click",()=>{storeScreen.style.display="none"; titleScreen.style.display="flex";});
leaderboardBtn.addEventListener("click",()=>{titleScreen.style.display="none"; leaderboardScreen.style.display="flex"; renderLeaderboard();});
pauseBtn.addEventListener("click",()=>{paused=!paused;if(!paused) update();});
restartBtn.addEventListener("click",()=>{startGame();});
homeBtn.addEventListener("click",()=>{titleScreen.style.display="flex"; restartBtn.style.display="none"; homeBtn.style.display="none"; pauseBtn.style.display="none";});

// Difficulty
document.querySelectorAll('input[name="difficulty"]').forEach(r=>{r.addEventListener("change",()=>{difficulty=r.value; pipeSpeed=difficultySpeeds[difficulty]; localStorage.setItem("fluppyDifficulty",difficulty);});});

// ----------------- Store -----------------
function renderSkins(){
  skinRow.innerHTML=""; upperSkinDisplay.innerHTML="";
  const upperImg=new Image(); upperImg.src=selectedSkin.file; upperImg.style.width="150px"; upperImg.style.height="150px"; upperSkinDisplay.appendChild(upperImg);
  skins.forEach(s=>{
    const box=document.createElement("div"); box.className="skinBox";
    const img=document.createElement("img"); img.src=s.file; box.appendChild(img);
    const name=document.createElement("div"); name.textContent=s.name; box.appendChild(name);
    const price=document.createElement("div"); price.textContent=s.unlockScore+" score"; box.appendChild(price);
    const overlay=document.createElement("div"); overlay.className="lockOverlay";
    if(skinData[s.name].unlocked) overlay.style.display="none"; else overlay.textContent="🔒"; box.appendChild(overlay);
    box.addEventListener("click",()=>{
      if(skinData[s.name].unlocked){selectedSkin=s; confirmSkinBtn.className="confirmBtn unlocked";} else confirmSkinBtn.className="confirmBtn locked";
      renderSkins();
    });
    skinRow.appendChild(box);
  });
  if(skinData[selectedSkin.name].unlocked) confirmSkinBtn.className="confirmBtn unlocked"; else confirmSkinBtn
