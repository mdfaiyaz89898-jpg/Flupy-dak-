<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// Elements
const playBtn=document.getElementById('playBtn');
const settingsBtnMain=document.getElementById('settingsBtnMain');
const storeBtn=document.getElementById('storeBtn');
const backBtn=document.querySelector('.backBtn');
const backStoreBtn=document.querySelector('.backStoreBtn');
const pauseBtn=document.getElementById('pauseBtn');
const restartBtn=document.getElementById('restartBtn');
const homeBtn=document.getElementById('homeBtn');
const confirmSkinBtn=document.getElementById('confirmSkinBtn');
const skinRow=document.getElementById('skinRow');
const upperSkinDisplay=document.getElementById('upperSkinDisplay');

// --- Game variables ---
let bird, gravity, pipes=[], score=0, gameOver=false, paused=false, gameStarted=false;

let baseSpeed = 1.5;
let pipeSpeed = baseSpeed;
let speedIncrement = 0.1;
let maxSpeed = 8;

let highScore = parseInt(localStorage.getItem('fluppyHighScore')) || 0;

// Stars
let stars=[];
for(let i=0;i<50;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*(canvas.height/2)});
}

// Skins
let skins=[
{name:'Bird',file:'Picsart_26-02-26_17-30-25-252.png',unlockScore:0,pipeColor:'#00c853',groundColor:'#8B4513'},
{name:'Mango Bird',file:'Picsart_26-02-27_01-28-33-302.png',unlockScore:10,pipeColor:'#FFA500',groundColor:'#FFCC80'},
{name:'Happy Perrot',file:'Picsart_26-02-27_10-16-34-761.png',unlockScore:20,pipeColor:'#ff4081',groundColor:'#f48fb1'},
{name:'Angry Bird',file:'Picsart_26-02-27_10-15-45-688.png',unlockScore:30,pipeColor:'#ff1744',groundColor:'#d50000'},
{name:'Crow',file:'Picsart_26-02-27_20-37-59-368.png',unlockScore:50,pipeColor:'#333',groundColor:'#555'}
];

let skinData=JSON.parse(localStorage.getItem('fluppySkins'))||{};
skins.forEach(s=>{if(!skinData[s.name]) skinData[s.name]={unlocked:s.unlockScore===0};});
let selectedSkinName=localStorage.getItem('selectedSkin')||'Bird';
let selectedSkin=skins.find(s=>s.name===selectedSkinName);

// PRELOAD BIRD IMAGE (important fix)
let birdImg=new Image();
birdImg.src=selectedSkin.file;

function initGame(){
bird={x:100,y:200,width:60,height:60,velocity:0,rotation:0};
gravity=0.35;
pipes=[];
score=0;
gameOver=false;
paused=false;
pipeSpeed=baseSpeed;
}

function createPipe(){
let gap=220; // fixed gap (difficulty removed)

const topHeight=Math.random()*(canvas.height-gap-100)+50;
pipes.push({
x:canvas.width,
width:70,
top:topHeight,
bottom:canvas.height-topHeight-gap,
passed:false
});
}

function startGame(){
document.getElementById('titleScreen').style.display='none';
document.getElementById('settingsScreen').style.display='none';
document.getElementById('storeScreen').style.display='none';
pauseBtn.style.display='block';
restartBtn.style.display='none';
homeBtn.style.display='none';

initGame();
gameStarted=true;
update();
}

function update(){
if(!gameStarted||gameOver||paused)return;

bird.velocity+=gravity;
bird.y+=bird.velocity;
bird.rotation=Math.min(bird.velocity*5,25);

ctx.clearRect(0,0,canvas.width,canvas.height);

// Day / Night
if(Math.floor(score/5)%2===0){
ctx.fillStyle="skyblue";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(canvas.width-100,100,50,0,Math.PI*2);
ctx.fill();
}else{
ctx.fillStyle="#1a1a2e";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>ctx.fillRect(s.x,s.y,2,2));
}

// Pipes
if(pipes.length===0||pipes[pipes.length-1].x<canvas.width-300){
createPipe();
}

pipes.forEach(pipe=>{
pipe.x-=pipeSpeed;

ctx.fillStyle=selectedSkin.pipeColor;
ctx.fillRect(pipe.x,0,pipe.width,pipe.top);
ctx.fillRect(pipe.x,canvas.height-pipe.bottom,pipe.width,pipe.bottom);

// Collision
if(bird.x<pipe.x+pipe.width&&
bird.x+bird.width>pipe.x&&
(bird.y<pipe.top||bird.y+bird.height>canvas.height-pipe.bottom)){
endGame();
}

// Score + Speed
if(!pipe.passed&&pipe.x+pipe.width<bird.x){
score++;
pipe.passed=true;
if(pipeSpeed<maxSpeed){
pipeSpeed+=speedIncrement;
}
}
});

// Ground
ctx.fillStyle=selectedSkin.groundColor;
ctx.fillRect(0,canvas.height-50,canvas.width,50);

// Bird draw (FIXED)
ctx.save();
ctx.translate(bird.x+bird.width/2,bird.y+bird.height/2);
ctx.rotate(bird.rotation*Math.PI/180);
ctx.drawImage(birdImg,-bird.width/2,-bird.height/2,bird.width,bird.height);
ctx.restore();

// Score text
ctx.fillStyle='black';
ctx.font='25px Arial';
ctx.fillText('Score: '+score,20,40);
ctx.fillText('High Score: '+highScore,20,70);

requestAnimationFrame(update);
}

function endGame(){
gameOver=true;
restartBtn.style.display='block';
homeBtn.style.display='block';
pauseBtn.style.display='none';

if(score>highScore){
highScore=score;
localStorage.setItem('fluppyHighScore',highScore);
}

skins.forEach(s=>{
if(score>=s.unlockScore)skinData[s.name].unlocked=true;
});
localStorage.setItem('fluppySkins',JSON.stringify(skinData));
}

function jump(){
if(gameStarted&&!gameOver)bird.velocity=-5;
}

document.addEventListener('click',jump);
document.addEventListener('touchstart',e=>{e.preventDefault();jump();});

// Buttons
playBtn.addEventListener('click',startGame);
restartBtn.addEventListener('click',startGame);
homeBtn.addEventListener('click',()=>{
document.getElementById('titleScreen').style.display='flex';
restartBtn.style.display='none';
homeBtn.style.display='none';
pauseBtn.style.display='none';
});
pauseBtn.addEventListener('click',()=>{
paused=!paused;
if(!paused)update();
});

// Store
function renderSkins(){
skinRow.innerHTML='';
upperSkinDisplay.innerHTML='';

birdImg.src=selectedSkin.file;

const upperImg=new Image();
upperImg.src=selectedSkin.file;
upperImg.style.width='150px';
upperImg.style.height='150px';
upperSkinDisplay.appendChild(upperImg);

skins.forEach(s=>{
const box=document.createElement('div');
box.className='skinBox';

const img=document.createElement('img');
img.src=s.file;
box.appendChild(img);

const name=document.createElement('div');
name.textContent=s.name;
box.appendChild(name);

const price=document.createElement('div');
price.textContent=s.unlockScore+' score';
box.appendChild(price);

const overlay=document.createElement('div');
overlay.className='lockOverlay';
overlay.style.display=skinData[s.name].unlocked?'none':'flex';
if(!skinData[s.name].unlocked)overlay.textContent='🔒';
box.appendChild(overlay);

box.addEventListener('click',()=>{
if(skinData[s.name].unlocked){
selectedSkin=s;
birdImg.src=s.file;
confirmSkinBtn.className='confirmBtn unlocked';
}else{
confirmSkinBtn.className='confirmBtn locked';
}
renderSkins();
});

skinRow.appendChild(box);
});
}

storeBtn.addEventListener('click',()=>{
document.getElementById('titleScreen').style.display='none';
document.getElementById('storeScreen').style.display='flex';
renderSkins();
});

backStoreBtn.addEventListener('click',()=>{
document.getElementById('storeScreen').style.display='none';
document.getElementById('titleScreen').style.display='flex';
});

confirmSkinBtn.addEventListener('click',()=>{
if(confirmSkinBtn.classList.contains('unlocked')){
localStorage.setItem('selectedSkin',selectedSkin.name);
document.getElementById('storeScreen').style.display='none';
document.getElementById('titleScreen').style.display='flex';
}
});
</script>
