<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ELEMENTS
const titleScreen = document.getElementById("titleScreen");
const settingsScreen = document.getElementById("settingsScreen");
const storeScreen = document.getElementById("storeScreen");
const playBtn = document.getElementById("playBtn");
const settingsBtnMain = document.getElementById("settingsBtnMain");
const storeBtn = document.getElementById("storeBtn");
const backBtn = document.querySelector(".backBtn");
const backStoreBtn = document.querySelector(".backStoreBtn");
const pauseBtn = document.getElementById("pauseBtn");
const restartBtn = document.getElementById("restartBtn");
const homeBtn = document.getElementById("homeBtn");
const confirmSkinBtn = document.getElementById("confirmSkinBtn");
const upperSkinDisplay = document.getElementById("upperSkinDisplay");
const skinRow = document.getElementById("skinRow");

// GAME VARS
let bird, gravity, pipes, score, highScore, gameOver, gameStarted=false, paused=false;
let pipeSpeed = 2, difficulty;
let pipeInterval, animationId;

highScore = localStorage.getItem("fluppyHighScore") || 0;
difficulty = localStorage.getItem("fluppyDifficulty") || "Very Easy";

// SKINS (UNCHANGED)
let skins = [
  {name:"Bird", file:"Picsart_26-02-26_17-30-25-252.png", unlockScore:0, pipeColor:"#00c853", groundColor:"#8B4513"},
  {name:"Mango Bird", file:"Picsart_26-02-27_01-28-33-302.png", unlockScore:10, pipeColor:"#FFA500", groundColor:"#FFCC80"},
  {name:"Happy Perrot", file:"Picsart_26-02-27_10-16-34-761.png", unlockScore:20, pipeColor:"#ff4081", groundColor:"#f48fb1"},
  {name:"Angry Bird", file:"Picsart_26-02-27_10-15-45-688.png", unlockScore:30, pipeColor:"#ff1744", groundColor:"#d50000"},
  {name:"Crow", file:"Picsart_26-02-27_20-37-59-368.png", unlockScore:50, pipeColor:"#333333", groundColor:"#555555"}
];

let skinData = JSON.parse(localStorage.getItem("fluppySkins")) || {};
skins.forEach(s=>{
    if(!skinData[s.name]) skinData[s.name]={unlocked: s.unlockScore===0};
});

let selectedSkinName = localStorage.getItem("selectedSkin") || "Bird";
let selectedSkin = skins.find(s=>s.name===selectedSkinName);

// INIT
function initGame(){
    bird = {x:100,y:200,width:60,height:60,velocity:0,rotation:0};
    gravity = 0.35;
    pipes = [];
    score = 0;
    gameOver = false;
    paused = false;
    pipeSpeed = 2;
}

// PIPE
function createPipe(){
    let gap = difficulty==="Hard"?150:(difficulty==="Normal"?200:280);
    let topHeight = Math.random()*(canvas.height-gap-100)+50;

    pipes.push({
        x:canvas.width,
        width:60,
        top:topHeight,
        bottom:canvas.height-topHeight-gap,
        passed:false
    });
}

// START GAME
function startGame(){
    cancelAnimationFrame(animationId);
    clearInterval(pipeInterval);

    initGame();
    gameStarted=false;

    titleScreen.style.display="none";
    settingsScreen.style.display="none";
    storeScreen.style.display="none";

    restartBtn.style.display="none";
    homeBtn.style.display="none";
    pauseBtn.style.display="none";

    // COUNTDOWN FIX
    let count=["3","2","1","Go!"];
    let i=0;

    let overlay=document.createElement("div");
    overlay.style="position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:120px;color:white;background:rgba(0,0,0,0.3);z-index:999";
    document.body.appendChild(overlay);

    let int=setInterval(()=>{
        overlay.innerText=count[i++];
        if(i===count.length){
            clearInterval(int);
            document.body.removeChild(overlay);

            gameStarted=true;
            pauseBtn.style.display="block";

            pipeInterval=setInterval(createPipe,2700);
            animationId=requestAnimationFrame(update);
        }
    },1000);
}

// END GAME
function endGame(){
    gameOver=true;
    clearInterval(pipeInterval);
    cancelAnimationFrame(animationId);

    restartBtn.style.display="block";
    homeBtn.style.display="block";
    pauseBtn.style.display="none";

    if(score > highScore){
        highScore = score;
        localStorage.setItem("fluppyHighScore", highScore);
    }
}

// UPDATE LOOP (MAIN FIX)
function update(){
    if(!gameStarted || gameOver || paused) return;

    bird.velocity += gravity;
    bird.y += bird.velocity;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // DAY/NIGHT (UNCHANGED)
    if(Math.floor(score/5)%2===0){
        ctx.fillStyle="skyblue";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle="yellow";
        ctx.beginPath();
        ctx.arc(canvas.width-100,100,50,0,Math.PI*2);
        ctx.fill();
    } else {
        ctx.fillStyle="#1a1a2e";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // PIPES
    pipes.forEach(p=>{
        p.x -= pipeSpeed;

        ctx.fillStyle = selectedSkin.pipeColor;
        ctx.fillRect(p.x,0,p.width,p.top);
        ctx.fillRect(p.x,canvas.height-p.bottom,p.width,p.bottom);

        if(!p.passed && p.x < bird.x){
            score++;
            p.passed=true;
        }

        if(
            bird.x < p.x+p.width &&
            bird.x+bird.width > p.x &&
            (bird.y < p.top || bird.y+bird.height > canvas.height-p.bottom)
        ){
            endGame();
        }
    });

    // BIRD IMAGE FIX
    const img = new Image();
    img.src = selectedSkin.file;
    ctx.drawImage(img,bird.x,bird.y,bird.width,bird.height);

    // SCORE
    ctx.fillStyle="black";
    ctx.font="25px Arial";
    ctx.fillText("Score: "+score,20,40);

    animationId=requestAnimationFrame(update);
}

// JUMP
function jump(){
    if(gameStarted && !gameOver && !paused){
        bird.velocity = -5;
    }
}
document.addEventListener("click", jump);

// BUTTON FIXES
playBtn.onclick=startGame;

pauseBtn.onclick=()=>{
    if(!gameStarted || gameOver) return;

    paused=!paused;

    if(paused){
        clearInterval(pipeInterval);
        cancelAnimationFrame(animationId);
        pauseBtn.innerHTML="▶";
    } else {
        pipeInterval=setInterval(createPipe,2700);
        animationId=requestAnimationFrame(update);
        pauseBtn.innerHTML="⏸";
    }
};

restartBtn.onclick=startGame;

homeBtn.onclick=()=>{
    cancelAnimationFrame(animationId);
    clearInterval(pipeInterval);

    titleScreen.style.display="flex";
    restartBtn.style.display="none";
    homeBtn.style.display="none";
    pauseBtn.style.display="none";
};

// NAVIGATION FIX
settingsBtnMain.onclick=()=>{
    titleScreen.style.display="none";
    settingsScreen.style.display="flex";
};
backBtn.onclick=()=>{
    settingsScreen.style.display="none";
    titleScreen.style.display="flex";
};
storeBtn.onclick=()=>{
    titleScreen.style.display="none";
    storeScreen.style.display="flex";
};
backStoreBtn.onclick=()=>{
    storeScreen.style.display="none";
    titleScreen.style.display="flex";
};
</script>
