<!DOCTYPE html>
<html>
<head>
<title>Flupy Dak 🐤</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
overflow:hidden;
background:skyblue;
}
canvas{
display:block;
margin:0 auto;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bird = {
x:100,
y:150,
size:20,
gravity:0.6,
lift:-10,
velocity:0
};

let pipes = [];
let score = 0;
let gameOver = false;

function drawBird(){
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(bird.x,bird.y,bird.size,0,Math.PI*2);
ctx.fill();
}

function drawPipes(){
ctx.fillStyle="green";
pipes.forEach(pipe=>{
ctx.fillRect(pipe.x,0,50,pipe.top);
ctx.fillRect(pipe.x,pipe.bottom,50,canvas.height);

if(
bird.x + bird.size > pipe.x &&
bird.x - bird.size < pipe.x + 50 &&
(bird.y - bird.size < pipe.top ||
 bird.y + bird.size > pipe.bottom)
){
gameOver = true;
}
});
}

function update(){
if(gameOver) return;

bird.velocity += bird.gravity;
bird.y += bird.velocity;

if(bird.y + bird.size > canvas.height){
gameOver = true;
}

pipes.forEach(pipe=>{
pipe.x -= 3;
});
}

function createPipe(){
if(gameOver) return;

let gap = 150;
let top = Math.random()*(canvas.height/2);
pipes.push({
x:canvas.width,
top:top,
bottom:top+gap
});
}

setInterval(createPipe,2000);

function drawScore(){
ctx.fillStyle="black";
ctx.font="30px Arial";
ctx.fillText("Score: "+score,20,40);
}

function drawGameOver(){
if(gameOver){
ctx.fillStyle="red";
ctx.font="50px Arial";
ctx.fillText("GAME OVER",canvas.width/2-150,canvas.height/2);
}
}

function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

drawBird();
drawPipes();
update();
drawScore();
drawGameOver();

if(!gameOver){
score++;
requestAnimationFrame(loop);
}
}

loop();

window.addEventListener("click",()=>{
if(!gameOver){
bird.velocity = bird.lift;
}
});
</script>

</body>
</html>
